<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#160f1e">
<title>Pride, Prejudice &amp; Pestilence 🖤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#efe6f2;
    --ink-dim:#b9a7c9;
    --plum:#160f1e;
    --plum2:#241733;
    --rose:#e77fa4;
    --rose-deep:#b34d76;
    --moon:#f6ecd2;
    --zombie:#a8c69f;
  }
  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    width:100%; height:100%;
    background:var(--plum);
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:none;
    position:fixed; inset:0;
    font-family:"Cormorant Garamond", Georgia, serif;
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
  }
  #stage{ position:absolute; inset:0; }
  canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; }

  /* ---------- HUD ---------- */
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:none;
    justify-content:space-between; align-items:center;
    padding:calc(env(safe-area-inset-top, 0px) + 8px) 14px 8px;
    pointer-events:none;
    background:linear-gradient(to bottom, rgba(12,7,18,.75), rgba(12,7,18,0));
    font-size:19px;
    letter-spacing:.04em;
    z-index:5;
  }
  #hud .hearts{ font-size:21px; letter-spacing:2px; text-shadow:0 0 6px rgba(231,127,164,.95), 0 0 14px rgba(231,127,164,.6); }
  #hud .hearts .lost{ opacity:.22; filter:grayscale(1); }
  #hud .night{
    font-family:"IM Fell English", Georgia, serif;
    font-style:italic; color:var(--ink-dim); font-size:17px;
  }
  #hud .letters{ text-shadow:0 0 8px rgba(246,236,210,.5); }
  #muteBtn{
    pointer-events:auto;
    background:rgba(36,23,51,.6);
    border:1px solid rgba(231,127,164,.35);
    color:var(--ink);
    border-radius:50%;
    width:36px; height:36px; font-size:16px; line-height:1;
    margin-left:10px;
  }

  /* ---------- Overlays ---------- */
  #overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    z-index:10;
    background:radial-gradient(ellipse at 50% 40%, rgba(22,15,30,.25) 0%, rgba(12,7,18,.78) 100%);
    backdrop-filter:blur(1.5px);
  }
  #overlay.hidden{ display:none; }
  .card{
    max-width:430px; width:100%;
    text-align:center;
    background:linear-gradient(170deg, rgba(36,23,51,.92), rgba(22,13,32,.94));
    border:1px solid rgba(231,127,164,.4);
    outline:3px double rgba(231,127,164,.25);
    outline-offset:6px;
    border-radius:14px;
    padding:26px 22px 24px;
    box-shadow:0 0 60px rgba(0,0,0,.6), 0 0 26px rgba(231,127,164,.12) inset;
    animation:cardIn .55s ease-out both;
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px) scale(.97);} to{ opacity:1; transform:none;} }
  .fleuron{ color:var(--rose); font-size:18px; letter-spacing:8px; opacity:.9; }
  .card h1{
    font-family:"IM Fell English", Georgia, serif;
    font-weight:400; font-size:clamp(26px, 7.4vw, 38px);
    line-height:1.12; margin:10px 0 2px;
    color:var(--moon);
    text-shadow:0 0 18px rgba(246,236,210,.35);
  }
  .card h1 .amp{ color:var(--rose); font-style:italic; }
  .card h2{
    font-family:"IM Fell English", Georgia, serif;
    font-weight:400; font-size:clamp(20px, 5.6vw, 26px);
    color:var(--moon); margin-bottom:6px;
  }
  .card .sub{
    font-style:italic; color:var(--ink-dim);
    font-size:16px; margin-bottom:14px; letter-spacing:.05em;
  }
  .card p{ font-size:17px; line-height:1.5; color:var(--ink); margin:10px 0; }
  .card p.quote{ font-style:italic; color:var(--ink-dim); }
  .rules{
    text-align:left; display:inline-block;
    font-size:16.5px; line-height:1.75; margin:6px 0 4px;
  }
  .rules b{ color:var(--rose); font-weight:600; }
  button.fancy{
    margin-top:16px;
    font-family:"IM Fell English", Georgia, serif;
    font-size:19px;
    color:var(--plum);
    background:linear-gradient(180deg, #f2d9e4, var(--rose));
    border:none; border-radius:999px;
    padding:12px 30px;
    letter-spacing:.06em;
    box-shadow:0 4px 18px rgba(231,127,164,.35), 0 0 0 1px rgba(246,236,210,.4) inset;
    cursor:pointer;
    transition:transform .12s ease;
  }
  button.fancy:active{ transform:scale(.95); }
  .tiny{ font-size:13.5px; color:var(--ink-dim); margin-top:12px; font-style:italic; }

  /* toast for in-game whispers */
  #toast{
    position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom,0px) + 56px);
    transform:translateX(-50%);
    background:rgba(22,13,32,.85);
    border:1px solid rgba(231,127,164,.4);
    border-radius:999px;
    color:var(--moon);
    font-style:italic; font-size:16px;
    padding:8px 18px;
    opacity:0; transition:opacity .4s;
    pointer-events:none; z-index:6;
    white-space:nowrap; max-width:92vw; text-overflow:ellipsis; overflow:hidden;
  }
  #toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>

  <div id="hud">
    <span class="hearts" id="hearts"></span>
    <span class="night" id="nightLabel"></span>
    <span class="letters"><span id="letterCount"></span> 💌<button id="muteBtn" title="sound">🔔</button></span>
  </div>

  <div id="toast"></div>

  <div id="overlay">
    <div class="card" id="card"></div>
  </div>
</div>

<script>
(() => {
"use strict";

/* =========================================================
   PRIDE, PREJUDICE & PESTILENCE
   a cute-goth courtship in three nights
   ========================================================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");
const heartsEl = document.getElementById("hearts");
const nightEl = document.getElementById("nightLabel");
const letterEl = document.getElementById("letterCount");
const overlay = document.getElementById("overlay");
const card = document.getElementById("card");
const toastEl = document.getElementById("toast");
const muteBtn = document.getElementById("muteBtn");

let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // keep the cast on the lawn if the window shrinks
  for (const e of allActors()) { e.x = clamp(e.x, 10, W - 10); e.y = clamp(e.y, horizonY() + 8, H - 14); }
}
window.addEventListener("resize", resize);

/* ---------- little helpers ---------- */
const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const rand = (a, b) => a + Math.random() * (b - a);
const pick = arr => arr[(Math.random() * arr.length) | 0];
const S = () => Math.min(W, H) / 480;          // global cuteness scale
const horizonY = () => H * 0.34;                // lawn starts here

/* =========================================================
   AUDIO — music box, howls, coos
   ========================================================= */
const AudioBox = {
  ctx: null, master: null, muted: false, nextNote: 0, step: 0,
  ensure(){
    if (this.ctx) { if (this.ctx.state === "suspended") this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.9;
    this.master.connect(this.ctx.destination);
  },
  tone({freq=440, type="triangle", t0=0, dur=0.3, vol=0.08, slide=0, attack=0.01}){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime + t0;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), t + dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur + 0.05);
  },
  chime(){ // letter collected — a tiny celesta flourish
    [880, 1174.7, 1568].forEach((f, i) => this.tone({freq:f, t0:i*0.07, dur:0.5, vol:0.07, type:"sine"}));
  },
  rose(){ this.tone({freq:660, dur:0.4, vol:0.06, type:"sine", slide:220}); },
  hurt(){
    this.tone({freq:150, dur:0.25, vol:0.12, type:"square", slide:-70});
    this.tone({freq:75, dur:0.35, vol:0.10, type:"sine", slide:-30});
  },
  coo(){ this.tone({freq:rand(500,640), dur:0.35, vol:0.035, type:"sine", slide:rand(120,240)}); },
  screech(){ // Lady Catherine announces herself
    this.tone({freq:1500, type:"sawtooth", dur:0.35, vol:0.05, slide:-800});
    this.tone({freq:1800, type:"square", dur:0.3, vol:0.03, slide:-900, t0:0.05});
  },
  sigh(){ this.tone({freq:700, type:"sine", dur:0.9, vol:0.045, slide:-350}); },
  gallop(){ for (let i = 0; i < 6; i++) this.tone({freq:95, type:"square", dur:0.09, vol:0.07, t0:i*0.16 + (i%2 ? 0.02 : 0)}); },
  tick(){ for (let i = 0; i < 4; i++) this.tone({freq:i%2 ? 900 : 1300, type:"square", dur:0.045, vol:0.05, t0:i*0.22}); },
  clink(){ this.tone({freq:1900, type:"sine", dur:0.15, vol:0.06}); this.tone({freq:2500, type:"sine", dur:0.2, vol:0.04, t0:0.06}); },
  yawn(){ this.tone({freq:500, type:"sine", dur:0.7, vol:0.05, slide:-260}); },
  howl(){
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain(), f = this.ctx.createBiquadFilter();
    o.type = "sawtooth"; f.type = "lowpass"; f.frequency.value = 900;
    o.frequency.setValueAtTime(220, t);
    o.frequency.exponentialRampToValueAtTime(520, t + 0.7);
    o.frequency.exponentialRampToValueAtTime(330, t + 1.7);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.25);
    g.gain.setValueAtTime(0.09, t + 1.1);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.9);
    o.connect(f); f.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 2);
  },
  // a slow, minor music box — only hums while playing
  MELODY: [440, 523.25, 659.25, 523.25, 587.33, 440, 349.23, 440,
           415.30, 523.25, 659.25, 587.33, 523.25, 440, 329.63, 349.23],
  music(dt){
    if (!this.ctx || this.muted) return;
    const now = this.ctx.currentTime;
    if (this.nextNote < now) this.nextNote = now + 0.05;
    while (this.nextNote < now + 0.25) {
      const f = this.MELODY[this.step % this.MELODY.length];
      this.tone({freq:f, t0:this.nextNote - now, dur:1.1, vol:0.028, type:"triangle"});
      if (this.step % 4 === 0) this.tone({freq:f/4, t0:this.nextNote - now, dur:1.6, vol:0.03, type:"sine"});
      this.step++;
      this.nextNote += 0.55;
    }
  }
};
muteBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  AudioBox.muted = !AudioBox.muted;
  muteBtn.textContent = AudioBox.muted ? "🔕" : "🔔";
});

/* =========================================================
   GAME STATE
   ========================================================= */
const NIGHTS = [
  { letters:5, zMax:4, zEvery:5.0, zSpeed:26, wolfChase:118, surgeEvery:[13,17], surgeLen:[3.5,4.5] },
  { letters:6, zMax:5, zEvery:4.2, zSpeed:29, wolfChase:128, surgeEvery:[11,15], surgeLen:[3.5,5.0],
    bat:{ every:[9,13], dive:400 } },
  { letters:7, zMax:6, zEvery:3.6, zSpeed:31, wolfChase:136, surgeEvery:[10,14], surgeLen:[4.0,5.0],
    bat:{ every:[9,13], dive:420 }, ghost:{ speed:42 } },
  { letters:8, zMax:7, zEvery:3.1, zSpeed:33, wolfChase:146, surgeEvery:[9,13],  surgeLen:[4.0,5.5],
    bat:{ every:[8,12], dive:440 }, ghost:{ speed:48 }, captain:{ every:[9,13], dash:430 } },
  { letters:9, zMax:8, zEvery:2.7, zSpeed:36, wolfChase:154, surgeEvery:[8,12],  surgeLen:[4.5,6.0],
    bat:{ every:[8,12], dive:460 }, ghost:{ speed:54 }, captain:{ every:[8,12], dash:470 },
    nurse:{ speed:30, spawnEvery:7 } },
];
const NIGHT_NAMES = ["First", "Second", "Third", "Fourth", "Fifth"];

const G = {
  state: "title",          // title | play | dead | won
  night: 0,
  hearts: 3,
  got: 0,
  t: 0,                    // global clock (for wobbles)
  started: false,          // has any night begun (keeps the lawn empty behind the title)
  shake: 0,
  flash: 0,                // red vignette pulse on hurt
  freezeT: 0,              // pocket-watch time-stop
};

const player = { x:0, y:0, tx:0, ty:0, r:14, speed:150, face:1, moving:false,
                 inv:0, veil:0, bob:0, speedT:0, hidden:false };
const wolf = { x:0, y:0, tx:0, ty:0, r:16, face:1,
               phase:"gent",          // gent | tele | wolf
               phaseT: 0, nextSurge: 14 };
/* the wider cast of villains — awakened night by night */
const bat = { x:0, y:0, state:"off",  // off | fly | aim | swoop
              timer:0, t:0, phaseT:0, aimX:0, aimY:0, dx:0, dy:0, ax:0.5, warned:false };
const ghost = { x:0, y:0, state:"off",  // off | roam | gone
                timer:0, wt:null, wtT:0 };
const captain = { x:0, y:0, state:"off",  // off | wait | tele | charge
                  timer:0, phaseT:0, dir:1, face:1, warned:false };
const nurse = { x:0, y:0, state:"off",  // off | roam
                face:1, spawnT:0, pauseT:0, wt:null, wtT:0 };
const lastSeen = { x:0, y:0 };           // where Lizzy was last spotted (hiding freezes it)
let zombies = [], letters = [], trinkets = [], particles = [];
let zTimer = 0, trinketTimer = 6, cooTimer = 2;

function allActors(){ return [player, wolf, ...zombies]; }

/* deterministic garden décor (fractions of W/H — resize-proof) */
const DECOR = [
  { t:"grave", x:.13, y:.52 }, { t:"grave", x:.82, y:.47 }, { t:"grave", x:.68, y:.86 },
  { t:"hedge", x:.30, y:.44 }, { t:"hedge", x:.90, y:.70 }, { t:"hedge", x:.08, y:.88 },
  { t:"grave", x:.45, y:.68 }, { t:"hedge", x:.55, y:.93 },
];
/* hollow topiaries — step into the arch to hide */
const HIDES = [ { x:.20, y:.58 }, { x:.78, y:.78 }, { x:.50, y:.46 } ];
const decorY = f => horizonY() + (H - horizonY()) * (f - 0.34) / 0.66;
const hideSpots = () => HIDES.map(h => ({ x: h.x * W, y: decorY(h.y), r: 30 * S() }));
const STARS = Array.from({length:46}, () => ({ x:Math.random(), y:Math.random()*0.30, s:rand(0.6,1.7), p:rand(0,TAU) }));
const FOG = Array.from({length:4}, (_, i) => ({ x:Math.random(), y:0.38 + i*0.16, w:rand(0.5,0.85), h:rand(0.05,0.09), v:rand(4,10) * (i%2 ? 1 : -1), a:rand(0.05,0.10) }));
const FLIES = Array.from({length:11}, () => ({ x:Math.random(), y:rand(0.4,0.95), p:rand(0,TAU), v:rand(0.3,0.9) }));

/* =========================================================
   NIGHT SETUP / FLOW
   ========================================================= */
function randomLawnSpot(minFromPlayer = 90, avoidHides = false){
  for (let i = 0; i < 40; i++) {
    const p = { x: rand(W*0.08, W*0.92), y: rand(horizonY() + 40*S(), H - 40) };
    if (Math.hypot(p.x - player.x, p.y - player.y) <= minFromPlayer * S()) continue;
    if (avoidHides && hideSpots().some(hd => Math.hypot(p.x - hd.x, p.y - hd.y) < hd.r + 16 * S())) continue;
    return p;
  }
  return { x: W/2, y: H*0.7 };
}

function startNight(n){
  G.night = n; G.hearts = 3; G.got = 0; G.state = "play"; G.started = true;
  const cfg = NIGHTS[n];
  player.x = player.tx = W/2; player.y = player.ty = H*0.72;
  player.inv = 1; player.veil = 0; player.moving = false;
  wolf.x = W*0.15; wolf.y = horizonY() + 60*S();
  wolf.phase = "gent"; wolf.phaseT = 0; wolf.nextSurge = rand(...cfg.surgeEvery) * 0.6;
  wolf.tx = wolf.x; wolf.ty = wolf.y;
  zombies = []; trinkets = []; particles = [];
  zTimer = 1.5; trinketTimer = 8;
  lastSeen.x = player.x; lastSeen.y = player.y;
  G.freezeT = 0; player.speedT = 0; player.hidden = false;
  // wake tonight's villains
  bat.state = cfg.bat ? "fly" : "off"; bat.warned = false;
  if (cfg.bat) { bat.timer = rand(...cfg.bat.every) * 0.7; bat.ax = rand(0.2, 0.8); bat.x = W * bat.ax; bat.y = H * 0.15; }
  ghost.state = cfg.ghost ? "gone" : "off";
  ghost.timer = 3; ghost.wt = null; ghost.wtT = 0;
  captain.state = cfg.captain ? "wait" : "off"; captain.warned = false;
  if (cfg.captain) captain.timer = rand(...cfg.captain.every);
  nurse.state = cfg.nurse ? "roam" : "off";
  if (cfg.nurse) { nurse.x = W * 0.5; nurse.y = horizonY() + 24 * S(); nurse.spawnT = cfg.nurse.spawnEvery; nurse.pauseT = 0; nurse.wt = null; nurse.wtT = 0; }
  letters = Array.from({length: cfg.letters}, () => {
    const p = randomLawnSpot(120, true);
    return { x:p.x, y:p.y, r:12, p:rand(0,TAU) };
  });
  hud.style.display = "flex";
  overlay.classList.add("hidden");
  updateHUD();
  toast(pick([
    "The night is young, and only slightly infested.",
    "Mind your hem, Miss Nightshade.",
    "Gather the letters before the moon grows opinionated.",
  ]));
}

function updateHUD(){
  heartsEl.innerHTML = Array.from({length:3}, (_, i) =>
    `<span class="${i < G.hearts ? "" : "lost"}">🖤</span>`).join("");
  nightEl.textContent = `~ Night the ${NIGHT_NAMES[G.night]} ~`;
  letterEl.textContent = `${G.got} / ${NIGHTS[G.night].letters}`;
}

let toastTimer = null;
function toast(msg, ms = 2600){
  toastEl.textContent = msg;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), ms);
}

/* ---------- overlay screens ---------- */
function showTitle(){
  G.state = "title"; hud.style.display = "none";
  overlay.classList.remove("hidden");
  card.innerHTML = `
    <div class="fleuron">❦ 🌹 ❦</div>
    <h1>Pride, Prejudice<br><span class="amp">&amp;</span> Pestilence</h1>
    <div class="sub">a moonlit courtship in five nights</div>
    <p class="quote">“It is a truth universally acknowledged, that a single
    gentleman in possession of a dreadful curse must be in want of a wife.”</p>
    <p>Miss Lizzy Nightshade must gather Mr&nbsp;Darcymoor's scattered love letters
    from the gardens of Pemberley — though the hour is late, the parish's
    unfortunate infants have risen <i>peckish</i> from their naps, and each night
    brings a new caller more dreadful than the last.</p>
    <div class="rules">
      ☞ <b>Hold or tap</b> the garden to guide Lizzy<br>
      💌 Gather every <b>love letter</b><br>
      🧟 Do not let the <b>baby zambies</b> nibble you<br>
      🌕 When the moon <b>blushes red</b> — <i>run.</i><br>
      🌳 Slip into a <b>hollow hedge</b> to hide from pursuers<br>
      🫖 Teacups, biscuits &amp; trinkets lend <b>timely aid</b>
    </div>
    <br><button class="fancy" id="beginBtn">Begin the Courtship</button>
    <div class="tiny">headphones recommended · best held upright, like one's posture</div>`;
  document.getElementById("beginBtn").addEventListener("click", () => {
    AudioBox.ensure();
    showNightIntro(0);
  });
}

const NIGHT_CARDS = [
  { title:"An Agreeable Stroll",
    quote:"“She could not fix upon the hour, or the spot, or the look which laid the foundation of her affection. The howling, however, she remembered precisely.”",
    tip:"The parish's infants are peckish, and Mr Darcymoor is… lunar. The hollow hedges 🌳 make a fine hiding place." },
  { title:"An Uninvited Patroness",
    quote:"“Miss Nightshade, are the shades of Pemberley to be thus haunted? Yes. By me.” — Lady Catherine de Bat",
    tip:"A new caller: Lady Catherine 🦇 circles above. When her shadow falls upon the lawn, step smartly aside." },
  { title:"The Late Governess",
    quote:"“Deportment, Miss Nightshade. The dead maintain excellent posture.” — Miss Graves, governess (retired; deceased)",
    tip:"A new caller: Miss Graves 👻 drifts toward you without pause or pity — but cannot fathom that a lady would hide in a hedge." },
  { title:"An Officer, Scarcely a Gentleman",
    quote:"“Captain Wickhead lost his head at the card table, and his manners shortly after.”",
    tip:"A new caller: the Captain ⚔️ charges clean across the garden with military punctuality. Mind the red line; quit his lane." },
  { title:"The Nursemaid's Rounds",
    quote:"“Old Nurse Rottingham has risen to gather her charges — and means to add you to the nursery.”",
    tip:"A final caller: the Nursemaid 🍼 is slow, vast, and endlessly producing infants. Tonight, every terror of Pemberley walks." },
];
function showNightIntro(n){
  G.state = "title";
  hud.style.display = "none";
  overlay.classList.remove("hidden");
  const c = NIGHT_CARDS[n];
  card.innerHTML = `
    <div class="fleuron">❦</div>
    <h2>Night the ${NIGHT_NAMES[n]}</h2>
    <div class="sub">“${c.title}”</div>
    <p class="quote">${c.quote}</p>
    <p>${c.tip}</p>
    <p>${NIGHTS[n].letters} letters lie waiting in the dark. 💌</p>
    <button class="fancy" id="goBtn">Step into the Garden</button>`;
  document.getElementById("goBtn").addEventListener("click", () => { AudioBox.ensure(); startNight(n); });
}

function showDead(){
  G.state = "dead"; hud.style.display = "none";
  overlay.classList.remove("hidden");
  card.innerHTML = `
    <div class="fleuron">🕸️ 🖤 🕸️</div>
    <h2>Alas.</h2>
    <p>Miss Nightshade has been quite thoroughly <i>nibbled</i>.</p>
    <p class="quote">Her reputation survives; her hem does not.</p>
    <button class="fancy" id="retryBtn">Attempt the Night Again</button>
    <div class="tiny">the infants send their apologies (they do not)</div>`;
  document.getElementById("retryBtn").addEventListener("click", () => showNightIntro(G.night));
}

function showWon(){
  G.state = "won"; hud.style.display = "none";
  overlay.classList.remove("hidden");
  card.innerHTML = `
    <div class="fleuron">🌹 🖤 🌹</div>
    <h2>Reader, she married him.</h2>
    <p>— with a stout garden fence, a silver-plated tea service,
    and the nursery kept <i>firmly</i> bolted after dusk.</p>
    <p class="quote">“You have bewitched me, body and soul. Mostly body,
    on full moons.” — Mr Darcymoor</p>
    <button class="fancy" id="againBtn">Court Once More</button>
    <div class="tiny">thank you for playing 🦇</div>`;
  document.getElementById("againBtn").addEventListener("click", () => showNightIntro(0));
}

/* =========================================================
   INPUT — hold to steer, tap to send
   ========================================================= */
let pointerDown = false;
function setTarget(e){
  const rect = canvas.getBoundingClientRect();
  player.tx = clamp(e.clientX - rect.left, 12, W - 12);
  player.ty = clamp(e.clientY - rect.top, horizonY() + 10, H - 16);
}
canvas.addEventListener("pointerdown", e => {
  if (G.state !== "play") return;
  AudioBox.ensure();
  pointerDown = true;
  setTarget(e);
});
canvas.addEventListener("pointermove", e => { if (pointerDown && G.state === "play") setTarget(e); });
window.addEventListener("pointerup", () => { pointerDown = false; });
window.addEventListener("pointercancel", () => { pointerDown = false; });

const keys = {};
window.addEventListener("keydown", e => { keys[e.key] = true; });
window.addEventListener("keyup", e => { keys[e.key] = false; });

/* =========================================================
   UPDATE
   ========================================================= */
function hurtPlayer(fromX, fromY){
  if (player.inv > 0 || player.veil > 0) return;
  G.hearts--; player.inv = 1.7; G.flash = 1; G.shake = 9;
  AudioBox.hurt();
  puff(player.x, player.y, "#3a2440", 10);
  // polite knockback
  const a = Math.atan2(player.y - fromY, player.x - fromX);
  player.tx = player.x = clamp(player.x + Math.cos(a) * 42 * S(), 12, W - 12);
  player.ty = player.y = clamp(player.y + Math.sin(a) * 42 * S(), horizonY() + 10, H - 16);
  updateHUD();
  if (G.hearts <= 0) { showDead(); }
  else toast(pick(["Ouch! Most impolite.", "A nibble! The scandal!", "One's ankles are NOT refreshments."]));
}

function puff(x, y, color, n = 8, sparkle = false){
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: rand(-50, 50), vy: rand(-80, -10),
      life: rand(0.5, 1.1), t: 0, color, sparkle,
      size: rand(2, 5) * S(),
      heart: sparkle && Math.random() < 0.45,
    });
  }
}

function update(dt){
  G.t += dt;
  if (G.state !== "play") return;
  AudioBox.music(dt);
  const cfg = NIGHTS[G.night];
  const s = S();
  const frozen = G.freezeT > 0;
  G.freezeT = Math.max(0, G.freezeT - dt);

  /* ----- player ----- */
  const spd = player.speed * (player.speedT > 0 ? 1.45 : 1) * s;
  let dx = 0, dy = 0;
  if (keys.ArrowLeft || keys.a) dx -= 1;
  if (keys.ArrowRight || keys.d) dx += 1;
  if (keys.ArrowUp || keys.w) dy -= 1;
  if (keys.ArrowDown || keys.s) dy += 1;
  if (dx || dy) {
    const m = Math.hypot(dx, dy);
    player.x += dx / m * spd * dt;
    player.y += dy / m * spd * dt;
    player.tx = player.x; player.ty = player.y;
    player.moving = true;
    if (dx) player.face = dx > 0 ? 1 : -1;
  } else {
    const d = Math.hypot(player.tx - player.x, player.ty - player.y);
    if (d > 4) {
      const step = Math.min(d, spd * dt);
      player.x += (player.tx - player.x) / d * step;
      player.y += (player.ty - player.y) / d * step;
      player.moving = true;
      if (Math.abs(player.tx - player.x) > 2) player.face = player.tx > player.x ? 1 : -1;
    } else player.moving = false;
  }
  player.x = clamp(player.x, 12, W - 12);
  player.y = clamp(player.y, horizonY() + 10, H - 16);
  player.bob += dt * (player.moving ? 11 : 3);
  player.inv = Math.max(0, player.inv - dt);
  player.veil = Math.max(0, player.veil - dt);
  player.speedT = Math.max(0, player.speedT - dt);

  /* ----- hiding: hollow hedges dim the lantern ----- */
  const wasHidden = player.hidden;
  player.hidden = hideSpots().some(hd => Math.hypot(player.x - hd.x, player.y - hd.y) < hd.r);
  if (!player.hidden) { lastSeen.x = player.x; lastSeen.y = player.y; }
  else if (!wasHidden) toast(pick(["Hidden! Most unladylike. Most effective.", "Quiet as a mouse in muslin…"]));

  /* ----- wolfman: gentleman → telegraph → beast ----- */
  if (!frozen) {
  wolf.phaseT += dt;
  if (wolf.phase === "gent") {
    wolf.nextSurge -= dt;
    // strolls with dignity toward polite viewing distance
    const dW = dist(wolf, player);
    if (!player.hidden && dW > 170 * s) { wolf.tx = lastSeen.x; wolf.ty = lastSeen.y; }
    else if (Math.hypot(wolf.tx - wolf.x, wolf.ty - wolf.y) < 20) {
      const p = randomLawnSpot(0); wolf.tx = p.x; wolf.ty = p.y;
    }
    moveToward(wolf, 34 * s, dt);
    if (wolf.nextSurge <= 0) {
      wolf.phase = "tele"; wolf.phaseT = 0;
      AudioBox.howl(); G.shake = 5;
      toast("The moon blushes… RUN!");
    }
  } else if (wolf.phase === "tele") {
    // rears back, shaking — 1.4 s of dread
    if (wolf.phaseT > 1.4) {
      wolf.phase = "wolf"; wolf.phaseT = 0;
      wolf.surgeLen = rand(...cfg.surgeLen);
    }
  } else { // wolf!
    wolf.tx = lastSeen.x; wolf.ty = lastSeen.y;
    moveToward(wolf, cfg.wolfChase * s, dt);
    if (!player.hidden && dist(wolf, player) < (wolf.r + player.r) * s * 1.05) hurtPlayer(wolf.x, wolf.y);
    const lostScent = player.hidden && Math.hypot(wolf.x - lastSeen.x, wolf.y - lastSeen.y) < 26 * s;
    if (wolf.phaseT > wolf.surgeLen || lostScent) {
      wolf.phase = "gent"; wolf.phaseT = 0;
      wolf.nextSurge = rand(...cfg.surgeEvery);
      const p = randomLawnSpot(0); wolf.tx = p.x; wolf.ty = p.y;
      toast(lostScent ? "He has quite lost your scent."
                      : pick(["Mr Darcymoor apologises profusely.", "“Do forgive me. The moon, you understand.”"]));
    }
  }
  }

  /* ----- baby zambies ----- */
  if (!frozen) {
  zTimer -= dt;
  if (zTimer <= 0 && zombies.length < cfg.zMax) {
    zTimer = cfg.zEvery * rand(0.8, 1.25);
    const side = (Math.random() * 4) | 0;
    const z = {
      x: side === 0 ? -20 : side === 1 ? W + 20 : rand(0, W),
      y: side === 2 ? horizonY() + 6 : side === 3 ? H + 20 : rand(horizonY() + 20, H),
      r: 11, wob: rand(0, TAU), stun: 0, sleep: 0, vx: 0, vy: 0, wt: null, wtT: 0,
      speed: cfg.zSpeed * rand(0.85, 1.2),
    };
    zombies.push(z);
  }
  cooTimer -= dt;
  if (cooTimer <= 0) { cooTimer = rand(2.5, 5); if (zombies.length) AudioBox.coo(); }

  for (const z of zombies) {
    if (z.sleep > 0) { z.sleep -= dt; continue; }   // naptime — biscuits work wonders
    z.wob += dt * 6;
    if (z.stun > 0) {
      z.stun -= dt;
      z.x += z.vx * dt; z.y += z.vy * dt;
      z.vx *= 0.9; z.vy *= 0.9;
    } else {
      const dp = dist(z, player) || 1;
      // hidden Lizzy fools them — unless they're close enough to sniff her out
      let tx = player.x, ty = player.y;
      if (player.hidden && dp > 60 * s) {
        z.wtT -= dt;
        if (!z.wt || z.wtT <= 0) { z.wt = randomLawnSpot(0); z.wtT = rand(1.5, 3); }
        tx = z.wt.x; ty = z.wt.y;
      }
      const d = Math.hypot(tx - z.x, ty - z.y) || 1;
      z.x += (tx - z.x) / d * z.speed * s * dt;
      z.y += (ty - z.y) / d * z.speed * s * dt;
      if (dp < (z.r + player.r) * s) {
        hurtPlayer(z.x, z.y);
        const a = Math.atan2(z.y - player.y, z.x - player.x);
        z.vx = Math.cos(a) * 140 * s; z.vy = Math.sin(a) * 140 * s;
        z.stun = 1.6;
      }
    }
    z.x = clamp(z.x, -30, W + 30);
    z.y = clamp(z.y, horizonY(), H + 30);
  }
  }

  /* ----- Lady Catherine de Bat: circles, screeches, swoops ----- */
  if (bat.state !== "off" && !frozen) {
    bat.t += dt;
    if (bat.state === "fly") {
      const hx = W * bat.ax + Math.sin(bat.t * 0.9) * W * 0.08;
      const hy = H * 0.15 + Math.sin(bat.t * 1.7) * H * 0.03;
      const ease = 1 - Math.pow(0.15, dt);
      bat.x = lerp(bat.x, hx, ease);
      bat.y = lerp(bat.y, hy, ease);
      bat.timer -= dt;
      if (bat.timer <= 0) {
        bat.state = "aim"; bat.phaseT = 0;
        bat.aimX = lastSeen.x; bat.aimY = lastSeen.y;
        AudioBox.screech();
        if (!bat.warned) { bat.warned = true; toast("Lady Catherine descends to give her opinion!"); }
      }
    } else if (bat.state === "aim") {
      bat.phaseT += dt;
      if (bat.phaseT > 1.1) {
        const d = Math.hypot(bat.aimX - bat.x, bat.aimY - bat.y) || 1;
        bat.dx = (bat.aimX - bat.x) / d; bat.dy = (bat.aimY - bat.y) / d;
        bat.state = "swoop";
      }
    } else { // swoop
      bat.x += bat.dx * cfg.bat.dive * s * dt;
      bat.y += bat.dy * cfg.bat.dive * s * dt;
      if (!player.hidden && Math.hypot(bat.x - player.x, bat.y - (player.y - 10 * s)) < (13 + player.r) * s) {
        hurtPlayer(bat.x, bat.y);
        bat.state = "fly"; bat.ax = rand(0.2, 0.8); bat.timer = rand(...cfg.bat.every);
      } else if (bat.x < -70 || bat.x > W + 70 || bat.y > H + 70 || bat.y < -80) {
        bat.state = "fly"; bat.ax = rand(0.2, 0.8);
        bat.x = clamp(bat.x, -60, W + 60); bat.y = -40;
        bat.timer = rand(...cfg.bat.every);
      }
    }
  }

  /* ----- the Late Governess: drifts without pause or pity ----- */
  if (ghost.state !== "off" && !frozen) {
    if (ghost.state === "gone") {
      ghost.timer -= dt;
      if (ghost.timer <= 0) {
        ghost.state = "roam";
        ghost.x = Math.random() < 0.5 ? -20 : W + 20;
        ghost.y = rand(horizonY() + 30, H - 40);
        AudioBox.sigh();
      }
    } else {
      let tx = player.x, ty = player.y;
      if (player.hidden) {   // she cannot fathom hiding in a hedge
        ghost.wtT -= dt;
        if (!ghost.wt || ghost.wtT <= 0) { ghost.wt = randomLawnSpot(0); ghost.wtT = rand(2, 4); }
        tx = ghost.wt.x; ty = ghost.wt.y;
      }
      const d = Math.hypot(tx - ghost.x, ty - ghost.y) || 1;
      ghost.x += (tx - ghost.x) / d * cfg.ghost.speed * s * dt + Math.sin(G.t * 2.3) * 12 * s * dt;
      ghost.y += (ty - ghost.y) / d * cfg.ghost.speed * s * dt;
      if (!player.hidden && Math.hypot(ghost.x - player.x, ghost.y - player.y) < (12 + player.r) * s) {
        hurtPlayer(ghost.x, ghost.y);
        ghost.state = "gone"; ghost.timer = 5;
        puff(ghost.x, ghost.y - 14 * s, "#cfc3de", 12);
        AudioBox.sigh();
      }
    }
  }

  /* ----- Captain Wickhead: charges with military punctuality ----- */
  if (captain.state !== "off" && !frozen) {
    if (captain.state === "wait") {
      captain.timer -= dt;
      if (captain.timer <= 0) {
        captain.state = "tele"; captain.phaseT = 0;
        captain.dir = lastSeen.x > W / 2 ? 1 : -1;
        captain.x = captain.dir === 1 ? -24 : W + 24;
        captain.y = clamp(lastSeen.y, horizonY() + 24 * s, H - 24);
        captain.face = captain.dir;
        AudioBox.gallop();
        if (!captain.warned) { captain.warned = true; toast("Hoofbeats! Captain Wickhead charges!"); }
      }
    } else if (captain.state === "tele") {
      captain.phaseT += dt;
      if (captain.phaseT > 1.0) captain.state = "charge";
    } else { // charge
      captain.x += captain.dir * cfg.captain.dash * s * dt;
      if (!player.hidden && Math.hypot(captain.x - player.x, captain.y - player.y) < (15 + player.r) * s)
        hurtPlayer(captain.x, captain.y);
      if (captain.x < -60 || captain.x > W + 60) {
        captain.state = "wait"; captain.timer = rand(...cfg.captain.every);
      }
    }
  }

  /* ----- Nurse Rottingham: slow, vast, endlessly producing infants ----- */
  if (nurse.state !== "off" && !frozen) {
    nurse.spawnT -= dt;
    if (nurse.pauseT > 0) nurse.pauseT -= dt;
    else {
      let tx = lastSeen.x, ty = lastSeen.y;
      if (player.hidden) {
        nurse.wtT -= dt;
        if (!nurse.wt || nurse.wtT <= 0) { nurse.wt = randomLawnSpot(0); nurse.wtT = rand(2, 4); }
        tx = nurse.wt.x; ty = nurse.wt.y;
      }
      const d = Math.hypot(tx - nurse.x, ty - nurse.y) || 1;
      if (d > 6) {
        nurse.x += (tx - nurse.x) / d * cfg.nurse.speed * s * dt;
        nurse.y += (ty - nurse.y) / d * cfg.nurse.speed * s * dt;
        nurse.face = tx > nurse.x ? 1 : -1;
      }
    }
    if (nurse.spawnT <= 0) {
      nurse.spawnT = cfg.nurse.spawnEvery;
      if (zombies.length < cfg.zMax + 3) {
        nurse.pauseT = 1.2;
        zombies.push({ x: nurse.x + rand(-20, 20) * s,
                       y: clamp(nurse.y + rand(10, 24) * s, horizonY() + 10, H - 16),
                       r: 11, wob: rand(0, TAU), stun: 0, sleep: 0, vx: 0, vy: 0, wt: null, wtT: 0,
                       speed: cfg.zSpeed * rand(0.85, 1.2) });
        puff(nurse.x, nurse.y - 10 * s, "#a8c69f", 8);
        AudioBox.coo();
      }
    }
    if (!player.hidden && Math.hypot(nurse.x - player.x, nurse.y - player.y) < (18 + player.r) * s)
      hurtPlayer(nurse.x, nurse.y);
    nurse.y = clamp(nurse.y, horizonY() + 10, H - 16);
  }

  /* ----- letters & trinkets ----- */
  for (let i = letters.length - 1; i >= 0; i--) {
    const L = letters[i];
    L.p += dt * 2.4;
    if (Math.hypot(L.x - player.x, L.y - player.y) < (L.r + player.r + 6) * s) {
      letters.splice(i, 1);
      G.got++; AudioBox.chime();
      puff(L.x, L.y, "#e77fa4", 12, true);
      updateHUD();
      if (G.got >= cfg.letters) {
        if (G.night >= NIGHTS.length - 1) showWon();
        else { toast("The night is survived! 🖤"); setTimeout(() => showNightIntro(G.night + 1), 900); G.state = "title"; }
        return;
      }
    }
  }
  trinketTimer -= dt;
  if (trinketTimer <= 0 && trinkets.length === 0) {
    trinketTimer = rand(9, 14);
    const roll = Math.random();
    let type = roll < 0.28 ? "rose" : roll < 0.52 ? "tea" : roll < 0.74 ? "biscuit" : roll < 0.90 ? "watch" : "salts";
    if (type === "salts" && G.hearts >= 3) type = "tea";
    const p = randomLawnSpot(70, true);
    trinkets.push({ type, x:p.x, y:p.y, r:11, p:rand(0,TAU) });
  }
  for (let i = trinkets.length - 1; i >= 0; i--) {
    const T = trinkets[i];
    T.p += dt * 3;
    if (Math.hypot(T.x - player.x, T.y - player.y) < (T.r + player.r + 4) * s) {
      trinkets.splice(i, 1);
      applyTrinket(T);
    }
  }

  /* ----- particles / effects ----- */
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += (p.sparkle ? -20 : 60) * dt;
    if (p.t > p.life) particles.splice(i, 1);
  }
  G.shake = Math.max(0, G.shake - dt * 22);
  G.flash = Math.max(0, G.flash - dt * 1.4);
}

function applyTrinket(T){
  puff(T.x, T.y, "#f2d9e4", 10, true);
  if (T.type === "rose") {
    player.veil = 5; AudioBox.rose();
    toast("A lace veil of protection! (briefly)");
  } else if (T.type === "tea") {
    player.speedT = 6; AudioBox.clink();
    toast("A fortifying cup of tea! Such vigour!");
  } else if (T.type === "biscuit") {
    for (const z of zombies) { z.sleep = 5; z.stun = 0; }
    AudioBox.yawn();
    toast("Biscuits! The infants settle down for naptime.");
  } else if (T.type === "watch") {
    G.freezeT = 4; AudioBox.tick();
    toast("The pocket watch! Time, being polite, pauses.");
  } else { // smelling salts
    G.hearts = Math.min(3, G.hearts + 1);
    updateHUD(); AudioBox.chime();
    toast("Smelling salts! One's constitution is restored.");
  }
}

function moveToward(e, speed, dt){
  const d = Math.hypot(e.tx - e.x, e.ty - e.y);
  if (d < 2) return;
  const step = Math.min(d, speed * dt);
  e.x += (e.tx - e.x) / d * step;
  e.y += (e.ty - e.y) / d * step;
  e.x = clamp(e.x, 8, W - 8);
  e.y = clamp(e.y, horizonY() + 4, H - 10);
  if (Math.abs(e.tx - e.x) > 2) e.face = e.tx > e.x ? 1 : -1;
}

/* =========================================================
   DRAW
   ========================================================= */
function draw(){
  const s = S();
  ctx.save();
  if (G.shake > 0.3) ctx.translate(rand(-G.shake, G.shake) * 0.5, rand(-G.shake, G.shake) * 0.5);

  const surging = wolf.phase !== "gent" && G.state === "play";
  drawSky(surging);
  drawBackdrop();
  drawDecor(s);

  // painter's order: sort lawn objects by y
  const items = [];
  if (G.started && (G.state === "play" || G.state === "title")) {
    if (bat.state === "aim") drawBatShadow(s);
    if (captain.state === "tele") drawChargeLane(s);
    for (const hd of hideSpots()) items.push({ y:hd.y + 12*s, f:() => drawHide(hd, s) });
    for (const L of letters) items.push({ y:L.y, f:() => drawLetter(L, s) });
    for (const T of trinkets) items.push({ y:T.y, f:() => drawTrinket(T, s) });
    for (const z of zombies) items.push({ y:z.y, f:() => drawZombie(z, s) });
    if (ghost.state === "roam") items.push({ y:ghost.y, f:() => drawGhost(s) });
    if (nurse.state !== "off") items.push({ y:nurse.y, f:() => drawNurse(s) });
    if (captain.state === "tele" || captain.state === "charge") items.push({ y:captain.y, f:() => drawCaptain(s) });
    items.push({ y:wolf.y, f:() => drawWolf(s) });
    items.push({ y:player.y, f:() => drawPlayer(s) });
  }
  items.sort((a, b) => a.y - b.y);
  for (const it of items) it.f();

  if (G.started && bat.state !== "off" && (G.state === "play" || G.state === "title")) drawBat(s);

  drawParticles(s);
  drawFog();
  drawFireflies(s);
  if (G.freezeT > 0) {   // the hour, politely paused
    ctx.fillStyle = `rgba(140,170,230,${0.10 * Math.min(1, G.freezeT)})`;
    ctx.fillRect(0, 0, W, H);
  }
  drawVignette(surging);
  ctx.restore();
}

function drawSky(surging){
  const g = ctx.createLinearGradient(0, 0, 0, H);
  if (surging) { g.addColorStop(0, "#2b1020"); g.addColorStop(0.4, "#341126"); g.addColorStop(1, "#120813"); }
  else { g.addColorStop(0, "#221533"); g.addColorStop(0.45, "#1a1026"); g.addColorStop(1, "#100a16"); }
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // stars
  for (const st of STARS) {
    const tw = 0.5 + 0.5 * Math.sin(G.t * 1.8 + st.p);
    ctx.globalAlpha = 0.25 + 0.5 * tw;
    ctx.fillStyle = "#efe6f2";
    ctx.fillRect(st.x * W, st.y * H, st.s, st.s);
  }
  ctx.globalAlpha = 1;

  // the moon (blushes red when Mr Darcymoor forgets himself)
  const mx = W * 0.78, my = H * 0.15, mr = Math.min(W, H) * 0.11;
  const blush = surging ? (wolf.phase === "tele" ? wolf.phaseT / 1.4 : 1) : 0;
  const moonCol = `rgb(${Math.round(lerp(246, 255, blush))},${Math.round(lerp(236, 120, blush))},${Math.round(lerp(210, 120, blush))})`;
  const glow = ctx.createRadialGradient(mx, my, mr * 0.3, mx, my, mr * 3.2);
  glow.addColorStop(0, surging ? "rgba(255,120,120,0.30)" : "rgba(246,236,210,0.22)");
  glow.addColorStop(1, "rgba(246,236,210,0)");
  ctx.fillStyle = glow;
  ctx.fillRect(mx - mr * 3.2, my - mr * 3.2, mr * 6.4, mr * 6.4);
  ctx.fillStyle = moonCol;
  ctx.beginPath(); ctx.arc(mx, my, mr, 0, TAU); ctx.fill();
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  for (const [cx, cy, cr] of [[-0.3,-0.15,0.16],[0.25,0.2,0.11],[0.05,-0.35,0.09],[-0.1,0.32,0.08]]) {
    ctx.beginPath(); ctx.arc(mx + cx*mr, my + cy*mr, cr*mr, 0, TAU); ctx.fill();
  }
  // a tiny bat or two, for ambience
  ctx.fillStyle = "#0d0812";
  for (let i = 0; i < 2; i++) {
    const bt = G.t * 0.35 + i * 2.5;
    const bx = W * (0.5 + 0.35 * Math.sin(bt * 0.7 + i));
    const by = H * (0.10 + 0.06 * Math.sin(bt * 1.3));
    const flap = Math.sin(G.t * 14 + i) * 3;
    ctx.beginPath();
    ctx.ellipse(bx, by, 3, 2, 0, 0, TAU);
    ctx.moveTo(bx, by); ctx.quadraticCurveTo(bx - 6, by - 4 - flap, bx - 10, by + 1);
    ctx.quadraticCurveTo(bx - 5, by + 1, bx, by);
    ctx.moveTo(bx, by); ctx.quadraticCurveTo(bx + 6, by - 4 - flap, bx + 10, by + 1);
    ctx.quadraticCurveTo(bx + 5, by + 1, bx, by);
    ctx.fill();
  }
}

function drawBackdrop(){
  const hy = horizonY();
  // Pemberley, in silhouette, with warm windows
  ctx.fillStyle = "#0d0812";
  const bw = Math.min(W * 0.42, 300), bh = Math.min(H * 0.16, 130), bx = W * 0.03, by = hy - bh;
  ctx.fillRect(bx, by, bw, bh);
  ctx.beginPath(); // roof
  ctx.moveTo(bx - 8, by); ctx.lineTo(bx + bw * 0.5, by - bh * 0.42); ctx.lineTo(bx + bw + 8, by);
  ctx.fill();
  ctx.fillRect(bx + bw * 0.42, by - bh * 0.75, bw * 0.16, bh * 0.75); // tower
  ctx.beginPath();
  ctx.moveTo(bx + bw * 0.38, by - bh * 0.75); ctx.lineTo(bx + bw * 0.5, by - bh * 1.05); ctx.lineTo(bx + bw * 0.62, by - bh * 0.75);
  ctx.fill();
  // windows — candlelit, flickering ever so slightly
  const flick = 0.75 + 0.25 * Math.sin(G.t * 7.3);
  ctx.fillStyle = `rgba(255,196,110,${0.55 * flick + 0.25})`;
  for (let i = 0; i < 4; i++) {
    const wx = bx + bw * (0.12 + i * 0.22), wy = by + bh * 0.3;
    ctx.fillRect(wx, wy, bw * 0.055, bh * 0.28);
    ctx.beginPath(); ctx.arc(wx + bw * 0.0275, wy, bw * 0.0275, Math.PI, 0); ctx.fill();
  }
  ctx.fillRect(bx + bw * 0.47, by - bh * 0.55, bw * 0.06, bh * 0.2);

  // dead trees
  drawTree(W * 0.62, hy, Math.min(W, H) * 0.14, 1);
  drawTree(W * 0.94, hy, Math.min(W, H) * 0.1, -1);

  // iron fence along the horizon
  ctx.strokeStyle = "#0d0812";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, hy - 2); ctx.lineTo(W, hy - 2);
  const gap = 14;
  for (let x = gap / 2; x < W; x += gap) {
    ctx.moveTo(x, hy - 2); ctx.lineTo(x, hy - 14);
    ctx.moveTo(x - 2.5, hy - 12); ctx.lineTo(x, hy - 17); ctx.lineTo(x + 2.5, hy - 12);
  }
  ctx.stroke();

  // the lawn
  const lg = ctx.createLinearGradient(0, hy, 0, H);
  lg.addColorStop(0, "#241733");
  lg.addColorStop(0.5, "#1d122a");
  lg.addColorStop(1, "#150d1f");
  ctx.fillStyle = lg;
  ctx.fillRect(0, hy, W, H - hy);
  // moonlit path glimmer
  const px = W * 0.6, py = hy + (H - hy) * 0.5, pr = W * 0.34;
  ctx.save();
  ctx.translate(px, py);
  ctx.scale(1, (H - hy) * 0.4 / pr);
  const pg = ctx.createRadialGradient(0, 0, 0, 0, 0, pr);
  pg.addColorStop(0, "rgba(246,236,210,0.06)");
  pg.addColorStop(1, "rgba(246,236,210,0)");
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(0, 0, pr, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawTree(x, baseY, h, flip){
  ctx.strokeStyle = "#0d0812";
  ctx.lineCap = "round";
  ctx.lineWidth = Math.max(3, h * 0.09);
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + 6 * flip, baseY - h * 0.5, x - 4 * flip, baseY - h);
  ctx.stroke();
  ctx.lineWidth = Math.max(2, h * 0.045);
  ctx.beginPath();
  ctx.moveTo(x + 2 * flip, baseY - h * 0.45);
  ctx.quadraticCurveTo(x + h * 0.3 * flip, baseY - h * 0.65, x + h * 0.42 * flip, baseY - h * 0.9);
  ctx.moveTo(x - flip, baseY - h * 0.7);
  ctx.quadraticCurveTo(x - h * 0.25 * flip, baseY - h * 0.9, x - h * 0.3 * flip, baseY - h * 1.1);
  ctx.stroke();
}

function drawDecor(s){
  for (const d of DECOR) {
    const x = d.x * W, y = horizonY() + (H - horizonY()) * (d.y - 0.34) / 0.66;
    if (d.t === "grave") {
      ctx.fillStyle = "#312440";
      ctx.beginPath();
      ctx.moveTo(x - 10*s, y);
      ctx.lineTo(x - 10*s, y - 16*s);
      ctx.arc(x, y - 16*s, 10*s, Math.PI, 0);
      ctx.lineTo(x + 10*s, y);
      ctx.fill();
      ctx.fillStyle = "rgba(231,127,164,0.5)";
      drawHeart(x, y - 14*s, 3.2*s);
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath(); ctx.ellipse(x, y + 1, 13*s, 3.5*s, 0, 0, TAU); ctx.fill();
    } else {
      ctx.fillStyle = "#1e2a22";
      ctx.beginPath();
      ctx.ellipse(x, y - 6*s, 16*s, 10*s, 0, 0, TAU);
      ctx.ellipse(x - 10*s, y - 2*s, 10*s, 7*s, 0, 0, TAU);
      ctx.ellipse(x + 10*s, y - 2*s, 10*s, 7*s, 0, 0, TAU);
      ctx.fill();
      ctx.fillStyle = "rgba(231,127,164,0.7)";
      ctx.beginPath(); ctx.arc(x - 6*s, y - 9*s, 1.6*s, 0, TAU); ctx.arc(x + 7*s, y - 5*s, 1.6*s, 0, TAU); ctx.fill();
    }
  }
}

function drawHeart(x, y, r){
  ctx.beginPath();
  ctx.moveTo(x, y + r);
  ctx.bezierCurveTo(x - r * 1.4, y - r * 0.4, x - r * 0.6, y - r * 1.4, x, y - r * 0.4);
  ctx.bezierCurveTo(x + r * 0.6, y - r * 1.4, x + r * 1.4, y - r * 0.4, x, y + r);
  ctx.fill();
}

function shadow(x, y, w, s){
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.beginPath(); ctx.ellipse(x, y, w * s, w * 0.32 * s, 0, 0, TAU); ctx.fill();
}

/* ----- Miss Lizzy Nightshade ----- */
function drawPlayer(s){
  const { x, y } = player;
  const bob = Math.sin(player.bob) * (player.moving ? 1.6 : 0.7) * s;
  const blink = player.inv > 0 && Math.floor(G.t * 12) % 2 === 0;
  if (blink) ctx.globalAlpha = 0.35;
  else if (player.hidden) ctx.globalAlpha = 0.5;

  shadow(x, y + 1*s, 13, s);

  if (!player.hidden) {
    // lantern glow — she carries a little light (dimmed when hiding)
    const lx = x + 13 * player.face * s, ly = y - 8*s + bob;
    const lg = ctx.createRadialGradient(lx, ly, 2*s, lx, ly, 46*s);
    lg.addColorStop(0, "rgba(255,196,110,0.28)");
    lg.addColorStop(1, "rgba(255,196,110,0)");
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.arc(lx, ly, 46*s, 0, TAU); ctx.fill();
  }

  ctx.save();
  ctx.translate(x, y + bob);
  ctx.scale(player.face, 1);

  // gown — empire waist, midnight plum
  const sway = Math.sin(player.bob) * (player.moving ? 2.2 : 0.6) * s;
  ctx.fillStyle = "#43284d";
  ctx.beginPath();
  ctx.moveTo(-4.5*s, -14*s);
  ctx.quadraticCurveTo(-13*s + sway, -2*s, -11*s + sway, 1.5*s);
  ctx.quadraticCurveTo(0, 4.5*s, 11*s + sway, 1.5*s);
  ctx.quadraticCurveTo(13*s + sway, -2*s, 4.5*s, -14*s);
  ctx.fill();
  // lace hem
  ctx.strokeStyle = "#efe6f2";
  ctx.lineWidth = 1.1 * s;
  ctx.setLineDash([2 * s, 2 * s]);
  ctx.beginPath();
  ctx.moveTo(-10.5*s + sway, 1*s);
  ctx.quadraticCurveTo(0, 4*s, 10.5*s + sway, 1*s);
  ctx.stroke();
  ctx.setLineDash([]);
  // sash under the bust
  ctx.fillStyle = "#e77fa4";
  ctx.fillRect(-5*s, -13.5*s, 10*s, 2.2*s);
  // little feet peeking as she walks
  if (player.moving) {
    ctx.fillStyle = "#241627";
    const ft = Math.sin(player.bob * 2) * 3 * s;
    ctx.beginPath();
    ctx.ellipse(-3*s + ft, 3.4*s, 2.2*s, 1.2*s, 0, 0, TAU);
    ctx.ellipse(3*s - ft, 3.4*s, 2.2*s, 1.2*s, 0, 0, TAU);
    ctx.fill();
  }
  // arms — one holds the lantern
  ctx.strokeStyle = "#f3e3d3";
  ctx.lineWidth = 2.4 * s;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(4*s, -13*s); ctx.quadraticCurveTo(10*s, -11*s, 12*s, -8.5*s);
  ctx.stroke();
  // lantern
  ctx.fillStyle = "#241627";
  ctx.fillRect(10.6*s, -8.5*s, 3.4*s, 4.4*s);
  ctx.fillStyle = `rgba(255,196,110,${0.8 + 0.2 * Math.sin(G.t * 9)})`;
  ctx.fillRect(11.3*s, -7.7*s, 2*s, 2.8*s);
  // head
  ctx.fillStyle = "#f3e3d3";
  ctx.beginPath(); ctx.arc(0, -20*s, 7*s, 0, TAU); ctx.fill();
  // hair — dark, swept up in a bun
  ctx.fillStyle = "#241627";
  ctx.beginPath();
  ctx.arc(0, -21.5*s, 7.2*s, Math.PI * 0.95, Math.PI * 2.05);
  ctx.quadraticCurveTo(8*s, -17*s, 5.5*s, -16*s);
  ctx.lineTo(-5.5*s, -16*s);
  ctx.quadraticCurveTo(-8*s, -17*s, -7*s, -20*s);
  ctx.fill();
  ctx.beginPath(); ctx.arc(-1*s, -28*s, 3.4*s, 0, TAU); ctx.fill(); // bun
  ctx.fillStyle = "#e77fa4";
  drawHeart(-1*s, -28*s, 1.7*s); // rose in the bun
  // face
  ctx.fillStyle = "#241627";
  ctx.beginPath();
  ctx.arc(2.2*s, -20.5*s, 0.95*s, 0, TAU);
  ctx.arc(-2.2*s, -20.5*s, 0.95*s, 0, TAU);
  ctx.fill();
  ctx.fillStyle = "rgba(231,127,164,0.55)"; // blush
  ctx.beginPath();
  ctx.arc(3.8*s, -18.3*s, 1.5*s, 0, TAU);
  ctx.arc(-3.8*s, -18.3*s, 1.5*s, 0, TAU);
  ctx.fill();
  ctx.strokeStyle = "#241627";
  ctx.lineWidth = 0.8 * s;
  ctx.beginPath(); ctx.arc(0, -18.4*s, 1.5*s, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
  ctx.restore();

  // the lace veil (rose shield)
  if (player.veil > 0) {
    const fade = Math.min(1, player.veil);
    ctx.strokeStyle = `rgba(242,217,228,${0.65 * fade})`;
    ctx.lineWidth = 1.4 * s;
    ctx.setLineDash([3 * s, 4 * s]);
    ctx.beginPath();
    ctx.arc(x, y - 12*s, 24 * s + Math.sin(G.t * 5) * 2 * s, 0, TAU);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.globalAlpha = 1;
}

/* ----- Mr Darcymoor, gentleman & occasional wolf ----- */
function drawWolf(s){
  const { x, y } = wolf;
  const isWolf = wolf.phase === "wolf";
  const tele = wolf.phase === "tele";
  const tremble = tele ? Math.sin(G.t * 40) * 1.5 * s : 0;
  const bob = Math.sin(G.t * (isWolf ? 16 : 7)) * (isWolf ? 2 : 1) * s;

  shadow(x, y + 1*s, 14, s);
  ctx.save();
  ctx.translate(x + tremble, y + bob);
  ctx.scale(wolf.face, 1);

  // tailcoat
  ctx.fillStyle = "#14101c";
  ctx.beginPath();
  ctx.moveTo(-6*s, -22*s);
  ctx.quadraticCurveTo(-9*s, -6*s, -7*s, 2*s);
  ctx.lineTo(-2.5*s, 0);
  ctx.lineTo(0, -4*s);
  ctx.lineTo(2.5*s, 0);
  ctx.lineTo(7*s, 2*s);
  ctx.quadraticCurveTo(9*s, -6*s, 6*s, -22*s);
  ctx.fill();
  // cravat / shirt
  ctx.fillStyle = "#efe6f2";
  ctx.beginPath();
  ctx.moveTo(-2.5*s, -21*s); ctx.lineTo(2.5*s, -21*s); ctx.lineTo(1.5*s, -13*s); ctx.lineTo(-1.5*s, -13*s);
  ctx.fill();
  if (isWolf) { // torn coat, fluffed fur bursting at the seams
    ctx.fillStyle = "#6b6577";
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI/2 + (i - 2) * 0.5;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * 8*s, -14*s + Math.sin(a) * 6*s, 2.6*s, 0, TAU);
      ctx.fill();
    }
  }
  // arms / claws
  ctx.strokeStyle = isWolf ? "#6b6577" : "#14101c";
  ctx.lineWidth = 2.6 * s;
  ctx.lineCap = "round";
  ctx.beginPath();
  if (isWolf) {
    ctx.moveTo(5*s, -18*s); ctx.quadraticCurveTo(12*s, -16*s, 14*s, -11*s);
    ctx.moveTo(-5*s, -18*s); ctx.quadraticCurveTo(-11*s, -14*s, -12*s, -9*s);
  } else {
    ctx.moveTo(5*s, -18*s); ctx.quadraticCurveTo(8*s, -13*s, 6*s, -9*s); // hand behind back, very proper
  }
  ctx.stroke();
  if (isWolf) {
    ctx.strokeStyle = "#efe6f2";
    ctx.lineWidth = 1 * s;
    ctx.beginPath();
    for (const [cx, cy] of [[14, -11], [-12, -9]]) {
      for (let i = -1; i <= 1; i++) {
        ctx.moveTo(cx*s + i*1.6*s, cy*s);
        ctx.lineTo(cx*s + i*1.6*s + 1.4*s, cy*s + 2.6*s);
      }
    }
    ctx.stroke();
  }

  // head
  if (isWolf || tele) {
    const fur = tele ? lerp(0.4, 1, wolf.phaseT / 1.4) : 1;
    ctx.fillStyle = "#6b6577";
    ctx.beginPath(); ctx.arc(0, -28*s, 8.2*s * (0.85 + 0.15 * fur), 0, TAU); ctx.fill();
    // ears
    ctx.beginPath();
    ctx.moveTo(-6*s, -33*s); ctx.lineTo(-8.5*s, -40*s); ctx.lineTo(-2.5*s, -35.5*s);
    ctx.moveTo(6*s, -33*s); ctx.lineTo(8.5*s, -40*s); ctx.lineTo(2.5*s, -35.5*s);
    ctx.fill();
    ctx.fillStyle = "#e77fa4"; // pink inner ears — he is still darling
    ctx.beginPath();
    ctx.moveTo(-5.5*s, -34*s); ctx.lineTo(-7*s, -38*s); ctx.lineTo(-3.5*s, -35.5*s);
    ctx.fill();
    // snout
    ctx.fillStyle = "#7d7789";
    ctx.beginPath(); ctx.ellipse(4.5*s, -26*s, 4.5*s, 3.2*s, 0, 0, TAU); ctx.fill();
    ctx.fillStyle = "#14101c";
    ctx.beginPath(); ctx.arc(8*s, -26.5*s, 1.5*s, 0, TAU); ctx.fill();
    // glowing eyes
    ctx.fillStyle = isWolf ? "#ffb347" : "#efd9a0";
    ctx.shadowColor = "#ffb347"; ctx.shadowBlur = 6 * s;
    ctx.beginPath();
    ctx.arc(1.5*s, -29.5*s, 1.4*s, 0, TAU);
    ctx.arc(-3*s, -29.5*s, 1.4*s, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
    // little fangs
    ctx.fillStyle = "#efe6f2";
    ctx.beginPath();
    ctx.moveTo(3*s, -24*s); ctx.lineTo(4*s, -22*s); ctx.lineTo(5*s, -24*s);
    ctx.fill();
  } else {
    ctx.fillStyle = "#f3e3d3";
    ctx.beginPath(); ctx.arc(0, -28*s, 7*s, 0, TAU); ctx.fill();
    // sideburns — most distinguished
    ctx.fillStyle = "#2c2233";
    ctx.beginPath();
    ctx.arc(0, -29*s, 7.2*s, Math.PI * 1.05, Math.PI * 1.95);
    ctx.fill();
    ctx.fillRect(-7.2*s, -29*s, 2.2*s, 5.5*s);
    ctx.fillRect(5*s, -29*s, 2.2*s, 5.5*s);
    // brooding eyes
    ctx.fillStyle = "#241627";
    ctx.beginPath();
    ctx.arc(2.4*s, -28.5*s, 0.9*s, 0, TAU);
    ctx.arc(-2.4*s, -28.5*s, 0.9*s, 0, TAU);
    ctx.fill();
    ctx.strokeStyle = "#241627";
    ctx.lineWidth = 0.8 * s;
    ctx.beginPath(); ctx.moveTo(-1.6*s, -25.5*s); ctx.lineTo(1.6*s, -25.5*s); ctx.stroke(); // unreadable mouth
  }
  // top hat (askew when transformed)
  ctx.save();
  if (isWolf) { ctx.translate(-3*s, -1*s); ctx.rotate(-0.35); }
  else if (tele) ctx.rotate(-0.12 * (wolf.phaseT / 1.4));
  ctx.fillStyle = "#0b0810";
  ctx.fillRect(-8*s, -35.5*s, 16*s, 1.8*s);
  ctx.fillRect(-5*s, -45*s, 10*s, 10*s);
  ctx.fillStyle = "#e77fa4";
  ctx.fillRect(-5*s, -37.4*s, 10*s, 1.6*s); // pink hat ribbon
  ctx.restore();

  ctx.restore();

  // telegraph: an alarmed "!" and gathering red aura
  if (tele) {
    ctx.fillStyle = "#ff8a8a";
    ctx.font = `italic ${Math.round(20 * s)}px Georgia, serif`;
    ctx.textAlign = "center";
    ctx.fillText("!", x, y - 52 * s - Math.sin(G.t * 10) * 3 * s);
  }
  if (isWolf) {
    ctx.strokeStyle = "rgba(255,120,120,0.25)";
    ctx.lineWidth = 2 * s;
    ctx.beginPath();
    ctx.arc(x, y - 16*s, 26 * s + Math.sin(G.t * 8) * 3 * s, 0, TAU);
    ctx.stroke();
  }
}

/* ----- the parish's unfortunate infants ----- */
function drawZombie(z, s){
  const wob = Math.sin(z.wob) * 0.12;
  const hop = Math.abs(Math.sin(z.wob)) * 2.4 * s;
  shadow(z.x, z.y + 1*s, 10, s);
  ctx.save();
  ctx.translate(z.x, z.y - hop);
  ctx.rotate(wob);

  // swaddle
  ctx.fillStyle = "#ded4c8";
  ctx.beginPath();
  ctx.ellipse(0, -4*s, 8.5*s, 7*s, 0, 0, TAU);
  ctx.fill();
  // patch stitches on the swaddle
  ctx.strokeStyle = "#a89a8a";
  ctx.lineWidth = 0.8 * s;
  ctx.beginPath();
  ctx.moveTo(-4*s, -2*s); ctx.lineTo(-1*s, -1*s);
  ctx.moveTo(-3.4*s, -0.8*s); ctx.lineTo(-1.8*s, -2.4*s);
  ctx.stroke();
  // reaching little arms
  ctx.strokeStyle = "#a8c69f";
  ctx.lineWidth = 2.4 * s;
  ctx.lineCap = "round";
  const reach = Math.sin(z.wob * 2) * 1.5 * s;
  ctx.beginPath();
  ctx.moveTo(-6*s, -6*s); ctx.lineTo(-10*s, -8*s - reach);
  ctx.moveTo(6*s, -6*s); ctx.lineTo(10*s, -8*s + reach);
  ctx.stroke();
  // head
  ctx.fillStyle = z.stun > 0 ? "#b8d0b0" : "#a8c69f";
  ctx.beginPath(); ctx.arc(0, -12*s, 6.5*s, 0, TAU); ctx.fill();
  // bonnet
  ctx.fillStyle = "#efe6f2";
  ctx.beginPath();
  ctx.arc(0, -13*s, 6.8*s, Math.PI * 0.9, Math.PI * 2.1);
  ctx.fill();
  ctx.strokeStyle = "#efe6f2";
  ctx.lineWidth = 1.2 * s;
  ctx.beginPath();
  ctx.moveTo(-6*s, -11*s); ctx.quadraticCurveTo(0, -8.5*s, 6*s, -11*s);
  ctx.stroke();
  // bonnet bow
  ctx.fillStyle = "#e77fa4";
  drawHeart(5.5*s, -10*s, 1.8*s);
  // face: button eye + stitched X eye + stitched smile
  ctx.fillStyle = "#241627";
  if (z.sleep > 0) {
    // fast asleep — biscuits work wonders
    ctx.strokeStyle = "#241627";
    ctx.lineWidth = 0.9 * s;
    ctx.beginPath();
    ctx.arc(-2.2*s, -12.6*s, 1.1*s, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.moveTo(3.4*s, -12.6*s);
    ctx.arc(2.3*s, -12.6*s, 1.1*s, 0.15 * Math.PI, 0.85 * Math.PI);
    ctx.stroke();
    ctx.fillStyle = "#b9a7c9";
    ctx.font = `italic ${Math.round(7 * s)}px Georgia`;
    ctx.textAlign = "center";
    ctx.fillText("z z", 9*s, -19*s);
    ctx.fillStyle = "#241627";
  } else if (z.stun > 0) {
    ctx.font = `${Math.round(5 * s)}px Georgia`;
    ctx.textAlign = "center";
    ctx.fillText("~  ~", 0, -11.5*s);
  } else {
    ctx.beginPath(); ctx.arc(-2.2*s, -12.5*s, 1*s, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#241627";
    ctx.lineWidth = 0.9 * s;
    ctx.beginPath();
    ctx.moveTo(1.4*s, -13.5*s); ctx.lineTo(3.2*s, -11.7*s);
    ctx.moveTo(3.2*s, -13.5*s); ctx.lineTo(1.4*s, -11.7*s);
    ctx.stroke();
  }
  ctx.strokeStyle = "#241627";
  ctx.lineWidth = 0.9 * s;
  ctx.beginPath();
  ctx.moveTo(-2.5*s, -9.5*s); ctx.quadraticCurveTo(0, -8.2*s, 2.5*s, -9.5*s);
  for (let i = -1; i <= 1; i++) { ctx.moveTo(i * 1.6*s, -9.9*s); ctx.lineTo(i * 1.6*s, -8.4*s); }
  ctx.stroke();
  ctx.restore();
}

function drawLetter(L, s){
  const bob = Math.sin(L.p) * 2.5 * s;
  const g = ctx.createRadialGradient(L.x, L.y - 6*s, 2*s, L.x, L.y - 6*s, 26*s);
  g.addColorStop(0, "rgba(246,236,210,0.30)");
  g.addColorStop(1, "rgba(246,236,210,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(L.x, L.y - 6*s, 26*s, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(L.x, L.y - 6*s + bob);
  ctx.rotate(Math.sin(L.p * 0.7) * 0.08);
  ctx.fillStyle = "#f6ecd2";
  ctx.fillRect(-8*s, -6*s, 16*s, 12*s);
  ctx.strokeStyle = "#c9b896";
  ctx.lineWidth = 1 * s;
  ctx.strokeRect(-8*s, -6*s, 16*s, 12*s);
  ctx.beginPath();
  ctx.moveTo(-8*s, -6*s); ctx.lineTo(0, 1*s); ctx.lineTo(8*s, -6*s);
  ctx.stroke();
  ctx.fillStyle = "#b34d76";
  drawHeart(0, 1.4*s, 2.6*s);
  ctx.restore();
  // sparkle
  const tw = 0.5 + 0.5 * Math.sin(L.p * 2);
  ctx.fillStyle = `rgba(246,236,210,${0.4 + 0.5 * tw})`;
  ctx.font = `${Math.round(9 * s)}px Georgia`;
  ctx.textAlign = "center";
  ctx.fillText("✦", L.x + 11*s, L.y - 14*s + bob);
}

function drawTrinket(T, s){
  const bob = Math.sin(T.p) * 1.6 * s;
  const g = ctx.createRadialGradient(T.x, T.y - 6*s, 1*s, T.x, T.y - 6*s, 20*s);
  g.addColorStop(0, "rgba(246,236,210,0.18)");
  g.addColorStop(1, "rgba(246,236,210,0)");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(T.x, T.y - 6*s, 20*s, 0, TAU); ctx.fill();
  ctx.save();
  ctx.translate(T.x, T.y + bob);
  if (T.type === "rose") {
    ctx.strokeStyle = "#3d5c3a";
    ctx.lineWidth = 1.6 * s;
    ctx.beginPath(); ctx.moveTo(0, 4*s); ctx.quadraticCurveTo(1.5*s, -1*s, 0, -5*s); ctx.stroke();
    ctx.fillStyle = "#3d5c3a";
    ctx.beginPath(); ctx.ellipse(-3*s, 0, 3*s, 1.6*s, -0.5, 0, TAU); ctx.fill();
    ctx.fillStyle = "#b34d76";
    ctx.beginPath(); ctx.arc(0, -7*s, 5*s, 0, TAU); ctx.fill();
    ctx.fillStyle = "#e77fa4";
    ctx.beginPath(); ctx.arc(-1*s, -8*s, 3*s, 0, TAU); ctx.fill();
    ctx.fillStyle = "#f2d9e4";
    ctx.beginPath(); ctx.arc(-1.5*s, -8.5*s, 1.4*s, 0, TAU); ctx.fill();
  } else if (T.type === "tea") {
    // a fortifying cup of tea, still steaming
    ctx.fillStyle = "#e7dcc8";
    ctx.beginPath(); ctx.ellipse(0, 0, 8*s, 2*s, 0, 0, TAU); ctx.fill();   // saucer
    ctx.fillStyle = "#f6ecd2";
    ctx.beginPath();
    ctx.moveTo(-6*s, -8*s); ctx.quadraticCurveTo(-5*s, -1*s, 0, -1*s);
    ctx.quadraticCurveTo(5*s, -1*s, 6*s, -8*s);
    ctx.fill();
    ctx.strokeStyle = "#f6ecd2"; ctx.lineWidth = 1.2*s;
    ctx.beginPath(); ctx.arc(7.5*s, -5.5*s, 2.2*s, -1.2, 1.6); ctx.stroke();  // handle
    ctx.fillStyle = "#8a5a3b";
    ctx.beginPath(); ctx.ellipse(0, -7.5*s, 5*s, 1.4*s, 0, 0, TAU); ctx.fill(); // the tea itself
    ctx.fillStyle = "#e77fa4";
    drawHeart(0, -4*s, 1.6*s);
    ctx.strokeStyle = `rgba(239,230,242,${0.4 + 0.3 * Math.sin(T.p * 2)})`;
    ctx.lineWidth = 1*s;
    ctx.beginPath();
    ctx.moveTo(-1.5*s, -10*s); ctx.quadraticCurveTo(-3*s, -13*s, -1*s, -16*s);
    ctx.moveTo(2*s, -10*s); ctx.quadraticCurveTo(0.5*s, -13*s, 2.5*s, -16*s);
    ctx.stroke();
  } else if (T.type === "biscuit") {
    ctx.fillStyle = "#d8b98a";
    ctx.beginPath(); ctx.arc(-3*s, -5*s, 4.5*s, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(4*s, -3*s, 4*s, 0, TAU); ctx.fill();
    ctx.fillStyle = "#b3906a";
    for (const [bx, by] of [[-4.5,-6.5],[-1.5,-4],[4,-4.5],[5.5,-2]]) {
      ctx.beginPath(); ctx.arc(bx*s, by*s, 0.8*s, 0, TAU); ctx.fill();
    }
    ctx.fillStyle = "#e77fa4";
    drawHeart(-3*s, -5*s, 1.4*s);
  } else if (T.type === "watch") {
    ctx.strokeStyle = "#e9c87a"; ctx.lineWidth = 1.2*s;
    ctx.beginPath(); ctx.moveTo(0, -14*s); ctx.quadraticCurveTo(4*s, -12*s, 2*s, -9.5*s); ctx.stroke();
    ctx.fillStyle = "#e9c87a";
    ctx.beginPath(); ctx.arc(0, -5*s, 6*s, 0, TAU); ctx.fill();
    ctx.fillStyle = "#f6ecd2";
    ctx.beginPath(); ctx.arc(0, -5*s, 4.6*s, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#241627"; ctx.lineWidth = 1*s;
    ctx.beginPath();
    ctx.moveTo(0, -5*s); ctx.lineTo(0, -8.5*s);
    ctx.moveTo(0, -5*s); ctx.lineTo(2.6*s, -4*s);
    ctx.stroke();
  } else { // smelling salts
    ctx.fillStyle = "#9fd6c9";
    ctx.beginPath();
    ctx.moveTo(-3.5*s, -1*s); ctx.lineTo(-3.5*s, -8*s); ctx.lineTo(-2*s, -10*s); ctx.lineTo(-2*s, -12*s);
    ctx.lineTo(2*s, -12*s); ctx.lineTo(2*s, -10*s); ctx.lineTo(3.5*s, -8*s); ctx.lineTo(3.5*s, -1*s);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#b34d76";
    ctx.fillRect(-2.2*s, -13.5*s, 4.4*s, 2*s);
    ctx.fillStyle = "#efe6f2";
    drawHeart(0, -5.5*s, 1.8*s);
  }
  ctx.restore();
  const tw = 0.5 + 0.5 * Math.sin(T.p * 2 + 1);
  ctx.fillStyle = `rgba(231,127,164,${0.3 + 0.5 * tw})`;
  ctx.font = `${Math.round(8 * s)}px Georgia`;
  ctx.textAlign = "center";
  ctx.fillText("✦", T.x - 9*s, T.y - 14*s);
}

/* ----- a hollow topiary — Lizzy's refuge ----- */
function drawHide(hd, s){
  const { x, y } = hd;
  ctx.fillStyle = "rgba(0,0,0,0.28)";
  ctx.beginPath(); ctx.ellipse(x, y + 14*s, 30*s, 7*s, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#233127";
  ctx.beginPath();
  ctx.ellipse(x, y - 6*s, 30*s, 20*s, 0, 0, TAU);
  ctx.ellipse(x - 20*s, y + 2*s, 16*s, 12*s, 0, 0, TAU);
  ctx.ellipse(x + 20*s, y + 2*s, 16*s, 12*s, 0, 0, TAU);
  ctx.fill();
  ctx.fillStyle = "#2b3d30";
  ctx.beginPath();
  ctx.ellipse(x - 8*s, y - 14*s, 12*s, 8*s, 0, 0, TAU);
  ctx.ellipse(x + 10*s, y - 12*s, 10*s, 7*s, 0, 0, TAU);
  ctx.fill();
  // the hollow archway
  ctx.fillStyle = "#10160f";
  ctx.beginPath();
  ctx.moveTo(x - 10*s, y + 12*s);
  ctx.lineTo(x - 10*s, y - 2*s);
  ctx.arc(x, y - 2*s, 10*s, Math.PI, 0);
  ctx.lineTo(x + 10*s, y + 12*s);
  ctx.fill();
  // climbing roses on the trim
  ctx.fillStyle = "rgba(231,127,164,0.75)";
  ctx.beginPath();
  ctx.arc(x - 14*s, y - 16*s, 1.8*s, 0, TAU);
  ctx.arc(x + 18*s, y - 10*s, 1.8*s, 0, TAU);
  ctx.arc(x + 2*s, y - 22*s, 1.8*s, 0, TAU);
  ctx.fill();
  // when Lizzy is within: her lantern glints in the dark
  if (player.hidden && Math.hypot(player.x - x, player.y - y) < hd.r) {
    ctx.fillStyle = `rgba(255,196,110,${0.45 + 0.3 * Math.sin(G.t * 6)})`;
    ctx.beginPath(); ctx.arc(x + 2*s, y + 3*s, 2*s, 0, TAU); ctx.fill();
  }
}

/* ----- Lady Catherine de Bat, an uninvited patroness ----- */
function drawBat(s){
  const { x, y } = bat;
  const flap = Math.sin(G.t * (bat.state === "swoop" ? 26 : 12));
  const sz = 1.4 * s;
  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "#241a30";
  for (const dir of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.quadraticCurveTo(dir*14*sz, -8*sz - flap*6*sz, dir*22*sz, 2*sz - flap*8*sz);
    ctx.quadraticCurveTo(dir*14*sz, 2*sz, dir*8*sz, 4*sz);
    ctx.quadraticCurveTo(dir*4*sz, 6*sz, 0, 4*sz);
    ctx.fill();
  }
  ctx.fillStyle = "#2e2140";
  ctx.beginPath(); ctx.ellipse(0, 2*sz, 6*sz, 7*sz, 0, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(0, -5*sz, 5*sz, 0, TAU); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-4*sz, -8*sz); ctx.lineTo(-6*sz, -13*sz); ctx.lineTo(-1*sz, -9.5*sz);
  ctx.moveTo(4*sz, -8*sz); ctx.lineTo(6*sz, -13*sz); ctx.lineTo(1*sz, -9.5*sz);
  ctx.fill();
  // her tiara — she is, after all, a Lady
  ctx.fillStyle = "#f6ecd2";
  ctx.beginPath();
  ctx.moveTo(-3.5*sz, -10*sz); ctx.lineTo(-2*sz, -13*sz); ctx.lineTo(-0.5*sz, -10.5*sz);
  ctx.lineTo(1*sz, -13.5*sz); ctx.lineTo(2.5*sz, -10*sz);
  ctx.fill();
  // a string of pearls
  ctx.fillStyle = "#efe6f2";
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath(); ctx.arc(i*2*sz, 8.5*sz + Math.abs(i)*0.6*sz, 1*sz, 0, TAU); ctx.fill();
  }
  // imperious glowing eyes with disapproving brows
  ctx.fillStyle = "#ffb347";
  ctx.shadowColor = "#ffb347"; ctx.shadowBlur = 5*s;
  ctx.beginPath(); ctx.arc(-2*sz, -5.5*sz, 1.1*sz, 0, TAU); ctx.arc(2*sz, -5.5*sz, 1.1*sz, 0, TAU); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = "#0d0812"; ctx.lineWidth = 0.9*s;
  ctx.beginPath();
  ctx.moveTo(-3.5*sz, -7.5*sz); ctx.lineTo(-1*sz, -6.8*sz);
  ctx.moveTo(3.5*sz, -7.5*sz); ctx.lineTo(1*sz, -6.8*sz);
  ctx.stroke();
  ctx.fillStyle = "#efe6f2";
  ctx.beginPath();
  ctx.moveTo(-1.5*sz, -2.5*sz); ctx.lineTo(-1*sz, -1*sz); ctx.lineTo(-0.5*sz, -2.5*sz);
  ctx.moveTo(0.5*sz, -2.5*sz); ctx.lineTo(1*sz, -1*sz); ctx.lineTo(1.5*sz, -2.5*sz);
  ctx.fill();
  ctx.restore();
}

function drawBatShadow(s){
  const k = clamp(bat.phaseT / 1.1, 0, 1);
  ctx.fillStyle = `rgba(0,0,0,${0.15 + 0.2 * k})`;
  ctx.beginPath();
  ctx.ellipse(bat.aimX, bat.aimY, (26 - 10*k)*s, (9 - 3.5*k)*s, 0, 0, TAU);
  ctx.fill();
  ctx.fillStyle = `rgba(255,138,138,${0.5 + 0.5 * Math.sin(G.t * 12)})`;
  ctx.font = `italic ${Math.round(15*s)}px Georgia, serif`;
  ctx.textAlign = "center";
  ctx.fillText("!", bat.aimX, bat.aimY - 14*s);
}

/* ----- Miss Graves, the Late Governess ----- */
function drawGhost(s){
  const { x, y } = ghost;
  const wav = Math.sin(G.t * 3) * 2 * s;
  ctx.save();
  ctx.globalAlpha = 0.55 + 0.15 * Math.sin(G.t * 2.1);
  ctx.translate(x, y + wav);
  const g = ctx.createLinearGradient(0, -34*s, 0, 8*s);
  g.addColorStop(0, "#ddd3ea");
  g.addColorStop(0.7, "rgba(221,211,234,0.55)");
  g.addColorStop(1, "rgba(221,211,234,0)");
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(-6*s, -26*s);
  ctx.quadraticCurveTo(-12*s, -8*s, -9*s + Math.sin(G.t*4)*2*s, 6*s);
  ctx.quadraticCurveTo(-3*s, 2*s, 0, 7*s);
  ctx.quadraticCurveTo(3*s, 2*s, 9*s + Math.cos(G.t*3.4)*2*s, 6*s);
  ctx.quadraticCurveTo(12*s, -8*s, 6*s, -26*s);
  ctx.fill();
  ctx.fillStyle = "#ddd3ea";
  ctx.beginPath(); ctx.arc(0, -30*s, 6.5*s, 0, TAU); ctx.fill();
  // a severe spectral bun
  ctx.fillStyle = "#b9a7c9";
  ctx.beginPath(); ctx.arc(0, -37*s, 2.8*s, 0, TAU); ctx.fill();
  // spectacles, worn low, seeing everything
  ctx.strokeStyle = "#6d5b80"; ctx.lineWidth = 0.9*s;
  ctx.beginPath();
  ctx.arc(-2.4*s, -30.5*s, 2*s, 0, TAU);
  ctx.moveTo(4.4*s, -30.5*s);
  ctx.arc(2.4*s, -30.5*s, 2*s, 0, TAU);
  ctx.stroke();
  ctx.fillStyle = "#241627";
  ctx.beginPath(); ctx.arc(-2.4*s, -30.5*s, 1*s, 0, TAU); ctx.arc(2.4*s, -30.5*s, 1*s, 0, TAU); ctx.fill();
  ctx.strokeStyle = "#6d5b80";
  ctx.beginPath(); ctx.moveTo(-1.6*s, -26.5*s); ctx.lineTo(1.6*s, -26.5*s); ctx.stroke();
  // a ruler, for correcting posture
  ctx.strokeStyle = "#b9a7c9"; ctx.lineWidth = 1.6*s;
  ctx.beginPath(); ctx.moveTo(6*s, -20*s); ctx.lineTo(12*s, -12*s); ctx.stroke();
  ctx.restore();
}

/* ----- Captain Wickhead, an officer scarcely a gentleman ----- */
function drawChargeLane(s){
  const a = 0.35 + 0.4 * Math.abs(Math.sin(G.t * 8));
  ctx.strokeStyle = `rgba(255,120,120,${a})`;
  ctx.lineWidth = 2*s;
  ctx.setLineDash([8*s, 8*s]);
  ctx.beginPath();
  ctx.moveTo(0, captain.y); ctx.lineTo(W, captain.y);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCaptain(s){
  const { x, y } = captain;
  const run = Math.sin(G.t * 18) * 2.5 * s;
  shadow(x, y + 1*s, 13, s);
  ctx.save();
  ctx.translate(x, y - Math.abs(run) * 0.5);
  ctx.scale(captain.face, 1);
  // legs mid-sprint
  ctx.strokeStyle = "#efe6f2";
  ctx.lineWidth = 2.6*s; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-1*s, -8*s); ctx.lineTo(-5*s - run, 2*s);
  ctx.moveTo(1*s, -8*s); ctx.lineTo(5*s + run, 2*s);
  ctx.stroke();
  // redcoat with gold sash
  ctx.fillStyle = "#8e2f3c";
  ctx.beginPath();
  ctx.moveTo(-6*s, -22*s);
  ctx.quadraticCurveTo(-8*s, -10*s, -5*s, -7*s);
  ctx.lineTo(5*s, -7*s);
  ctx.quadraticCurveTo(8*s, -10*s, 6*s, -22*s);
  ctx.fill();
  ctx.strokeStyle = "#e9c87a"; ctx.lineWidth = 1.4*s;
  ctx.beginPath(); ctx.moveTo(-5*s, -20*s); ctx.lineTo(4*s, -9*s); ctx.stroke();
  ctx.fillStyle = "#e9c87a";
  for (let i = 0; i < 3; i++) { ctx.beginPath(); ctx.arc(0, (-18 + i*4)*s, 0.9*s, 0, TAU); ctx.fill(); }
  // where a head should be: crisp collar and a faint spectral wisp
  ctx.fillStyle = "#efe6f2";
  ctx.beginPath(); ctx.ellipse(0, -23*s, 4*s, 1.6*s, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "rgba(185,167,201,0.5)";
  ctx.beginPath(); ctx.ellipse(0, -27*s, 2.5*s, 3.5*s, 0, 0, TAU); ctx.fill();
  // sabre raised
  ctx.strokeStyle = "#8e2f3c"; ctx.lineWidth = 2.4*s;
  ctx.beginPath(); ctx.moveTo(4*s, -18*s); ctx.quadraticCurveTo(9*s, -22*s, 11*s, -26*s); ctx.stroke();
  ctx.strokeStyle = "#cfd4de"; ctx.lineWidth = 1.4*s;
  ctx.beginPath(); ctx.moveTo(11*s, -26*s); ctx.lineTo(17*s, -34*s); ctx.stroke();
  // his head, carried under the other arm — still flirting
  ctx.strokeStyle = "#8e2f3c"; ctx.lineWidth = 2.4*s;
  ctx.beginPath(); ctx.moveTo(-4*s, -16*s); ctx.quadraticCurveTo(-8*s, -14*s, -9*s, -11*s); ctx.stroke();
  ctx.fillStyle = "#f3e3d3";
  ctx.beginPath(); ctx.arc(-10*s, -9*s, 4.5*s, 0, TAU); ctx.fill();
  ctx.fillStyle = "#14101c";
  ctx.beginPath(); ctx.ellipse(-10*s, -12.5*s, 5.5*s, 2*s, -0.15, 0, TAU); ctx.fill(); // bicorne
  ctx.strokeStyle = "#241627"; ctx.lineWidth = 0.9*s;
  ctx.beginPath(); ctx.moveTo(-12*s, -9.5*s); ctx.lineTo(-10.8*s, -9.5*s); ctx.stroke(); // winking
  ctx.fillStyle = "#241627";
  ctx.beginPath(); ctx.arc(-8.6*s, -9.5*s, 0.8*s, 0, TAU); ctx.fill();
  ctx.strokeStyle = "#241627";
  ctx.beginPath(); ctx.moveTo(-11.5*s, -7.4*s); ctx.quadraticCurveTo(-10*s, -6.4*s, -8.5*s, -7.4*s); ctx.stroke();
  ctx.restore();
}

/* ----- Nurse Rottingham, gathering her charges ----- */
function drawNurse(s){
  const { x, y } = nurse;
  const wob = Math.sin(G.t * 4) * 0.05;
  shadow(x, y + 2*s, 20, s);
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(wob);
  ctx.scale(nurse.face, 1);
  // great grey gown
  ctx.fillStyle = "#4a4152";
  ctx.beginPath();
  ctx.moveTo(-8*s, -30*s);
  ctx.quadraticCurveTo(-20*s, -6*s, -16*s, 4*s);
  ctx.quadraticCurveTo(0, 9*s, 16*s, 4*s);
  ctx.quadraticCurveTo(20*s, -6*s, 8*s, -30*s);
  ctx.fill();
  // apron, much mended
  ctx.fillStyle = "#ded4c8";
  ctx.beginPath();
  ctx.moveTo(-7*s, -24*s);
  ctx.quadraticCurveTo(-11*s, -4*s, -9*s, 2*s);
  ctx.quadraticCurveTo(0, 6*s, 9*s, 2*s);
  ctx.quadraticCurveTo(11*s, -4*s, 7*s, -24*s);
  ctx.fill();
  ctx.strokeStyle = "#a89a8a"; ctx.lineWidth = 1*s;
  ctx.strokeRect(-4*s, -12*s, 8*s, 7*s);
  // arms reaching with big mitts
  ctx.strokeStyle = "#8ba883"; ctx.lineWidth = 3.4*s; ctx.lineCap = "round";
  const reach = Math.sin(G.t * 5) * 2*s;
  ctx.beginPath();
  ctx.moveTo(-10*s, -22*s); ctx.lineTo(-18*s, -18*s - reach);
  ctx.moveTo(10*s, -22*s); ctx.lineTo(18*s, -18*s + reach);
  ctx.stroke();
  // head — kindly, if decomposing
  ctx.fillStyle = "#8ba883";
  ctx.beginPath(); ctx.arc(0, -36*s, 9*s, 0, TAU); ctx.fill();
  // a truly enormous bonnet
  ctx.fillStyle = "#efe6f2";
  ctx.beginPath(); ctx.arc(0, -38*s, 9.6*s, Math.PI * 0.85, Math.PI * 2.15); ctx.fill();
  ctx.strokeStyle = "#efe6f2"; ctx.lineWidth = 1.6*s;
  ctx.beginPath(); ctx.moveTo(-8.5*s, -34*s); ctx.quadraticCurveTo(0, -30*s, 8.5*s, -34*s); ctx.stroke();
  ctx.fillStyle = "#e77fa4";
  drawHeart(8*s, -32*s, 2.2*s);
  // spectacles low on the nose, stitched smile
  ctx.strokeStyle = "#241627"; ctx.lineWidth = 1.1*s;
  ctx.beginPath();
  ctx.arc(-3*s, -36*s, 2.2*s, 0, TAU);
  ctx.moveTo(5.2*s, -36*s);
  ctx.arc(3*s, -36*s, 2.2*s, 0, TAU);
  ctx.stroke();
  ctx.fillStyle = "#241627";
  ctx.beginPath(); ctx.arc(-3*s, -36*s, 1*s, 0, TAU); ctx.arc(3*s, -36*s, 1*s, 0, TAU); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-3.5*s, -31.5*s); ctx.quadraticCurveTo(0, -29.5*s, 3.5*s, -31.5*s);
  ctx.stroke();
  for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(i*2.2*s, -31.9*s); ctx.lineTo(i*2.2*s, -30*s); ctx.stroke(); }
  ctx.restore();
  if (nurse.pauseT > 0) {
    ctx.fillStyle = "#f6ecd2";
    ctx.font = `italic ${Math.round(12*s)}px Georgia, serif`;
    ctx.textAlign = "center";
    ctx.fillText("hush now…", x, y - 52*s);
  }
}

function drawParticles(s){
  for (const p of particles) {
    const a = 1 - p.t / p.life;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    if (p.heart) drawHeart(p.x, p.y, p.size * 0.9);
    else { ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, TAU); ctx.fill(); }
  }
  ctx.globalAlpha = 1;
}

function drawFog(){
  for (const f of FOG) {
    const x = (((f.x + G.t * f.v / 900) % 1.4 + 1.4) % 1.4 - 0.2) * W;
    const y = f.y * H, rw = f.w * W * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1, f.h * H / rw);
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, rw);
    g.addColorStop(0, `rgba(185,167,201,${f.a})`);
    g.addColorStop(0.7, `rgba(185,167,201,${f.a * 0.5})`);
    g.addColorStop(1, "rgba(185,167,201,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, rw, 0, TAU); ctx.fill();
    ctx.restore();
  }
}

function drawFireflies(s){
  for (const fl of FLIES) {
    const fx = (fl.x + Math.sin(G.t * fl.v + fl.p) * 0.03) * W;
    const fy = (fl.y + Math.cos(G.t * fl.v * 0.8 + fl.p) * 0.02) * H;
    const tw = Math.max(0, Math.sin(G.t * 2.2 + fl.p * 3));
    ctx.fillStyle = `rgba(255,230,150,${0.15 + 0.5 * tw})`;
    ctx.beginPath(); ctx.arc(fx, fy, 1.6 * s + tw * s, 0, TAU); ctx.fill();
  }
}

function drawVignette(surging){
  const g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H) * 0.35, W/2, H/2, Math.max(W,H) * 0.75);
  g.addColorStop(0, "rgba(0,0,0,0)");
  g.addColorStop(1, surging ? "rgba(40,5,12,0.55)" : "rgba(8,4,14,0.5)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  if (G.flash > 0) {
    ctx.fillStyle = `rgba(180,40,60,${G.flash * 0.22})`;
    ctx.fillRect(0, 0, W, H);
  }
}

/* =========================================================
   MAIN LOOP
   ========================================================= */
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

resize();
showTitle();
requestAnimationFrame(frame);

// a discreet side door, for testing one's nights
window.__PPP = { G, startNight, player, wolf, bat, ghost, captain, nurse };

})();
</script>
