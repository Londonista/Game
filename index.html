<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#70c5ce">
<meta name="apple-mobile-web-app-title" content="Flappy Beans">
<title>Flappy Beans 🫘</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #70c5ce;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #game {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function () {
  "use strict";

  var canvas = document.getElementById("game");
  var ctx = canvas.getContext("2d");

  // ---- Display sizing (Retina-crisp, portrait) -------------------------------
  // Internal coordinate space is a fixed virtual size; we scale to fit the
  // screen so the game looks identical on every phone.
  var VW = 360;            // virtual width
  var VH = 640;            // virtual height
  var scale = 1;
  var offsetX = 0;
  var offsetY = 0;
  var dpr = 1;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    var cssW = window.innerWidth;
    var cssH = window.innerHeight;
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";

    // Fit the virtual canvas inside the screen, keeping aspect ratio.
    scale = Math.max(cssW / VW, cssH / VH); // cover the whole screen
    offsetX = (cssW - VW * scale) / 2;
    offsetY = (cssH - VH * scale) / 2;
  }
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", resize);
  resize();

  // ---- Game constants --------------------------------------------------------
  var GRAVITY = 0.45;
  var FLAP = -7.6;
  var MAX_FALL = 11;
  var PIPE_W = 60;
  var GAP = 165;            // gap between top and bottom obstacle
  var PIPE_SPEED = 2.4;
  var PIPE_SPACING = 220;   // horizontal distance between pipe pairs
  var GROUND_H = 90;
  var BEAN_R = 17;          // collision radius (a touch forgiving)
  var BEAN_X = VW * 0.30;

  // ---- Game state ------------------------------------------------------------
  var STATE_READY = 0, STATE_PLAY = 1, STATE_OVER = 2;
  var state = STATE_READY;

  var bean = { y: VH / 2, vy: 0, rot: 0 };
  var pipes = [];
  var score = 0;
  var best = 0;
  try { best = parseInt(localStorage.getItem("flappyBeansBest") || "0", 10) || 0; } catch (e) {}

  var groundScroll = 0;
  var bgScroll = 0;
  var frame = 0;
  var flashAlpha = 0;       // white flash on hit
  var overTimer = 0;        // small delay before retry allowed

  // ---- Laser eyes ------------------------------------------------------------
  var LASER_HOLD = 75;      // frames the beam must stay on a stalk to vaporize it (~1.2s).
                            // Tuned below 2s because a stalk is only in front of the bean
                            // ~1.5s as it approaches, so a longer hold is impossible to land.
  var lasersOn = false;
  try { lasersOn = localStorage.getItem("flappyBeansLaser") === "1"; } catch (e) {}
  var laserHitPipe = null;  // pipe the beam is currently touching (for drawing the impact)
  var laserImpact = { x: 0, y: 0, hit: false };
  var particles = [];       // vaporize burst particles
  var pendingFlap = null;   // timer id used to debounce single- vs two-finger touch

  function toggleLasers() {
    lasersOn = !lasersOn;
    try { localStorage.setItem("flappyBeansLaser", lasersOn ? "1" : "0"); } catch (e) {}
    if (lasersOn) sndLaserToggle();
    else sndLaserOff();
  }

  function resetGame() {
    bean.y = VH / 2;
    bean.vy = 0;
    bean.rot = 0;
    pipes = [];
    particles = [];
    score = 0;
    frame = 0;
    flashAlpha = 0;
    // seed first pipes off-screen to the right
    for (var i = 0; i < 3; i++) {
      spawnPipe(VW + 60 + i * PIPE_SPACING);
    }
  }

  function spawnPipe(x) {
    var margin = 70;
    var minTop = margin;
    var maxTop = VH - GROUND_H - GAP - margin;
    var topH = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: x, top: topH, passed: false, charge: 0, destroyed: false });
  }

  // ---- Sound (WebAudio, generated — no files) --------------------------------
  var audioCtx = null;
  function initAudio() {
    if (audioCtx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) audioCtx = new AC();
    } catch (e) {}
  }
  function beep(freq, dur, type, vol) {
    if (!audioCtx) return;
    try {
      var t = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = type || "square";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(vol || 0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur);
    } catch (e) {}
  }
  function sndFlap() { beep(620, 0.09, "square", 0.06); }
  function sndScore() { beep(880, 0.10, "sine", 0.09); beep(1320, 0.10, "sine", 0.05); }
  function sndHit() { beep(180, 0.20, "sawtooth", 0.10); beep(90, 0.30, "sawtooth", 0.08); }
  function sndLaserToggle() { beep(440, 0.08, "sawtooth", 0.06); beep(1200, 0.12, "sawtooth", 0.05); }
  function sndLaserOff() { beep(700, 0.08, "sine", 0.05); beep(300, 0.10, "sine", 0.05); }
  function sndZap() { beep(140, 0.30, "sawtooth", 0.12); beep(70, 0.40, "square", 0.08); beep(900, 0.08, "sawtooth", 0.05); }

  // ---- Input -----------------------------------------------------------------
  function flap() {
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();

    if (state === STATE_READY) {
      state = STATE_PLAY;
      bean.vy = FLAP;
      sndFlap();
    } else if (state === STATE_PLAY) {
      bean.vy = FLAP;
      sndFlap();
    } else if (state === STATE_OVER) {
      if (overTimer <= 0) {
        resetGame();
        state = STATE_READY;
      }
    }
  }

  function onTouchStart(e) {
    if (e.cancelable) e.preventDefault();
    initAudio();
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();

    if (e.touches && e.touches.length >= 2) {
      // Two fingers down: this is a laser toggle, not a flap.
      if (pendingFlap) { clearTimeout(pendingFlap); pendingFlap = null; }
      toggleLasers();
      return;
    }
    // One finger: wait a tiny moment in case a second finger is landing.
    if (pendingFlap) clearTimeout(pendingFlap);
    pendingFlap = setTimeout(function () { pendingFlap = null; flap(); }, 70);
  }

  function onMouseDown(e) {
    if (e.cancelable) e.preventDefault();
    flap();
  }

  canvas.addEventListener("touchstart", onTouchStart, { passive: false });
  canvas.addEventListener("mousedown", onMouseDown);
  window.addEventListener("keydown", function (e) {
    if (e.code === "Space" || e.key === " " || e.code === "ArrowUp") {
      e.preventDefault();
      flap();
    } else if (e.key === "l" || e.key === "L") {
      e.preventDefault();
      initAudio();
      if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
      toggleLasers();
    }
  });

  // ---- Laser geometry --------------------------------------------------------
  // World position of the bean's visible eye (matches drawBean()).
  function eyeWorld() {
    var r = BEAN_R + 2;
    var lx = r * 0.45, ly = -r * 0.35;
    var c = Math.cos(bean.rot), s = Math.sin(bean.rot);
    return { x: BEAN_X + lx * c - ly * s, y: bean.y + lx * s + ly * c, ang: bean.rot };
  }

  // Cast the eye-ray to the right; find the first solid stalk it lands on.
  // Beam passes through gaps and already-destroyed pipes. Updates laserImpact.
  function computeLaser() {
    var e = eyeWorld();
    var c = Math.cos(e.ang), s = Math.sin(e.ang);
    if (c < 0.05) c = 0.05; // beam always travels rightward
    laserHitPipe = null;
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      if (p.destroyed) continue;
      if (p.x <= e.x) continue;            // only stalks ahead of the eye
      var yAt = e.y + (p.x - e.x) * (s / c);
      if (yAt < p.top || yAt > p.top + GAP) {
        laserHitPipe = p;
        laserImpact.x = p.x;
        laserImpact.y = Math.max(0, Math.min(VH, yAt));
        laserImpact.hit = true;
        return;
      }
    }
    // No stalk hit — beam exits the right edge of the screen.
    laserImpact.x = VW;
    laserImpact.y = e.y + (VW - e.x) * (s / c);
    laserImpact.hit = false;
  }

  function spawnBurst(x, y) {
    for (var i = 0; i < 16; i++) {
      var a = Math.random() * Math.PI * 2;
      var sp = 1 + Math.random() * 4;
      particles.push({
        x: x, y: y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
        life: 1, color: Math.random() < 0.5 ? "#ff5a3c" : "#ffd23c"
      });
    }
  }

  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.03;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  // ---- Update ----------------------------------------------------------------
  function update() {
    frame++;
    if (overTimer > 0) overTimer--;
    if (flashAlpha > 0) flashAlpha -= 0.06;

    // backgrounds always drift a little for life
    bgScroll = (bgScroll + 0.3) % VW;
    updateParticles();

    if (state === STATE_READY) {
      // gentle bobbing while waiting
      bean.y = VH / 2 + Math.sin(frame / 18) * 8;
      bean.rot = Math.sin(frame / 18) * 0.12;
      groundScroll = (groundScroll + PIPE_SPEED) % 24;
      if (lasersOn) computeLaser(); else laserHitPipe = null;
      return;
    }

    if (state === STATE_PLAY) {
      bean.vy += GRAVITY;
      if (bean.vy > MAX_FALL) bean.vy = MAX_FALL;
      bean.y += bean.vy;

      // rotation follows velocity
      var target = bean.vy < 0 ? -0.5 : Math.min(1.4, bean.vy / 10);
      bean.rot += (target - bean.rot) * 0.18;

      groundScroll = (groundScroll + PIPE_SPEED) % 24;

      // move pipes
      for (var i = 0; i < pipes.length; i++) {
        pipes[i].x -= PIPE_SPEED;
        if (!pipes[i].passed && pipes[i].x + PIPE_W < BEAN_X - BEAN_R) {
          pipes[i].passed = true;
          score++;
          sndScore();
        }
      }
      // recycle / spawn
      if (pipes.length && pipes[0].x + PIPE_W < -10) pipes.shift();
      var last = pipes[pipes.length - 1];
      if (!last || last.x < VW - PIPE_SPACING) {
        spawnPipe((last ? last.x : VW) + PIPE_SPACING);
      }

      // lasers: hold the beam on a stalk for ~2s to vaporize it
      if (lasersOn) {
        computeLaser();
        for (var j = 0; j < pipes.length; j++) {
          var pp = pipes[j];
          if (pp === laserHitPipe) {
            pp.charge++;
            if (pp.charge >= LASER_HOLD && !pp.destroyed) {
              pp.destroyed = true;
              spawnBurst(BEAN_X + (laserImpact.x - BEAN_X) * 0.5, laserImpact.y);
              flashAlpha = 0.4;
              sndZap();
            }
          } else if (pp.charge > 0) {
            pp.charge -= 3;
            if (pp.charge < 0) pp.charge = 0;
          }
        }
      } else {
        laserHitPipe = null;
      }

      // collisions
      if (checkCollision()) {
        die();
      }
    } else if (state === STATE_OVER) {
      // bean falls to the ground
      if (bean.y < VH - GROUND_H - BEAN_R) {
        bean.vy += GRAVITY;
        bean.y += bean.vy;
        bean.rot += (1.5 - bean.rot) * 0.12;
      } else {
        bean.y = VH - GROUND_H - BEAN_R;
      }
    }
  }

  function checkCollision() {
    // ground / ceiling
    if (bean.y + BEAN_R >= VH - GROUND_H) return true;
    if (bean.y - BEAN_R <= 0) { bean.y = BEAN_R; bean.vy = 0; }

    var bx = BEAN_X;
    for (var i = 0; i < pipes.length; i++) {
      var p = pipes[i];
      if (p.destroyed) continue;
      if (bx + BEAN_R > p.x && bx - BEAN_R < p.x + PIPE_W) {
        var gapTop = p.top;
        var gapBot = p.top + GAP;
        if (bean.y - BEAN_R < gapTop || bean.y + BEAN_R > gapBot) {
          return true;
        }
      }
    }
    return false;
  }

  function die() {
    state = STATE_OVER;
    overTimer = 45;
    flashAlpha = 0.8;
    sndHit();
    if (score > best) {
      best = score;
      try { localStorage.setItem("flappyBeansBest", String(best)); } catch (e) {}
    }
  }

  // ---- Drawing ---------------------------------------------------------------
  function drawBackground() {
    // sky gradient
    var g = ctx.createLinearGradient(0, 0, 0, VH);
    g.addColorStop(0, "#5fc6d6");
    g.addColorStop(1, "#9fe3c0");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, VW, VH);

    // soft clouds
    ctx.fillStyle = "rgba(255,255,255,0.55)";
    for (var i = 0; i < 4; i++) {
      var cx = ((i * 130) - bgScroll * 0.5) % (VW + 120);
      if (cx < -120) cx += VW + 120;
      var cy = 90 + (i % 2) * 70;
      cloud(cx, cy, 26 + (i % 2) * 8);
    }

    // distant hills
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    var hy = VH - GROUND_H - 30;
    for (var h = 0; h < 5; h++) {
      var hx = ((h * 110) - bgScroll * 0.7) % (VW + 110);
      if (hx < -110) hx += VW + 110;
      ctx.beginPath();
      ctx.arc(hx + 55, hy + 40, 70, Math.PI, 2 * Math.PI);
      ctx.fill();
    }
  }

  function cloud(x, y, r) {
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r, y + 4, r * 0.8, 0, Math.PI * 2);
    ctx.arc(x - r, y + 6, r * 0.7, 0, Math.PI * 2);
    ctx.arc(x + r * 0.4, y - r * 0.6, r * 0.7, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawPipe(p) {
    if (p.destroyed) return; // vaporized — only the burst particles remain
    var gapTop = p.top;
    var gapBot = p.top + GAP;
    var x = p.x;

    var grad = ctx.createLinearGradient(x, 0, x + PIPE_W, 0);
    grad.addColorStop(0, "#5aa832");
    grad.addColorStop(0.5, "#7bc843");
    grad.addColorStop(1, "#4f9a2c");

    // top stalk
    ctx.fillStyle = grad;
    ctx.fillRect(x, 0, PIPE_W, gapTop);
    // bottom stalk
    ctx.fillRect(x, gapBot, PIPE_W, VH - GROUND_H - gapBot);

    // rims (lips)
    ctx.fillStyle = "#3f7d22";
    var lip = 16, over = 5;
    ctx.fillRect(x - over, gapTop - lip, PIPE_W + over * 2, lip);
    ctx.fillRect(x - over, gapBot, PIPE_W + over * 2, lip);

    // highlight
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    ctx.fillRect(x + 6, 0, 6, gapTop);
    ctx.fillRect(x + 6, gapBot, 6, VH - GROUND_H - gapBot);

    // "heating up" glow while a laser is charging on this stalk
    if (p.charge > 0) {
      var heat = Math.min(1, p.charge / LASER_HOLD);
      ctx.fillStyle = "rgba(255,80,40," + (0.45 * heat) + ")";
      ctx.fillRect(x, 0, PIPE_W, gapTop);
      ctx.fillRect(x, gapBot, PIPE_W, VH - GROUND_H - gapBot);
    }
  }

  function drawGround() {
    var y = VH - GROUND_H;
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, y, VW, GROUND_H);
    // grass strip
    ctx.fillStyle = "#7bc843";
    ctx.fillRect(0, y, VW, 14);
    ctx.fillStyle = "#4f9a2c";
    ctx.fillRect(0, y + 14, VW, 4);
    // dirt texture stripes (scrolling)
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    for (var x = -24 + (-groundScroll % 24); x < VW; x += 24) {
      ctx.fillRect(x, y + 22, 12, GROUND_H - 22);
    }
  }

  function drawBean() {
    ctx.save();
    ctx.translate(BEAN_X, bean.y);
    ctx.rotate(bean.rot);

    // body — kidney bean shape via two arcs + bezier
    var r = BEAN_R + 2;
    var grad = ctx.createLinearGradient(-r, -r, r, r);
    grad.addColorStop(0, "#d98a4e");
    grad.addColorStop(1, "#a85d2a");

    ctx.fillStyle = grad;
    ctx.strokeStyle = "#7c4318";
    ctx.lineWidth = 2;
    ctx.beginPath();
    // a plump kidney-bean outline
    ctx.moveTo(-r * 0.2, -r);
    ctx.bezierCurveTo(r, -r * 1.1, r * 1.15, r * 0.4, r * 0.3, r);
    ctx.bezierCurveTo(-r * 0.2, r * 1.15, -r * 1.05, r * 0.7, -r, 0);
    ctx.bezierCurveTo(-r * 1.15, -r * 0.7, -r * 0.7, -r * 1.05, -r * 0.2, -r);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // seam line
    ctx.strokeStyle = "rgba(124,67,24,0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-r * 0.45, -r * 0.2);
    ctx.bezierCurveTo(0, -r * 0.5, r * 0.2, r * 0.1, -r * 0.1, r * 0.55);
    ctx.stroke();

    // cheek blush
    ctx.fillStyle = "rgba(255,150,120,0.45)";
    ctx.beginPath();
    ctx.arc(r * 0.35, r * 0.15, 4, 0, Math.PI * 2);
    ctx.fill();

    // eye
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(r * 0.45, -r * 0.35, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#222";
    var pupil = (state === STATE_OVER) ? 0 : 1; // dead eyes look forward
    ctx.beginPath();
    ctx.arc(r * 0.45 + 1.5 * pupil, -r * 0.35, 3, 0, Math.PI * 2);
    ctx.fill();

    // smile (or x_x mouth on game over)
    ctx.strokeStyle = "#5a2e10";
    ctx.lineWidth = 2;
    ctx.beginPath();
    if (state === STATE_OVER) {
      ctx.arc(r * 0.35, r * 0.15, 4, Math.PI, 2 * Math.PI);
    } else {
      ctx.arc(r * 0.35, 0, 5, 0.1 * Math.PI, 0.9 * Math.PI);
    }
    ctx.stroke();

    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function text(str, x, y, size, color, stroke) {
    ctx.font = "700 " + size + "px -apple-system, 'Segoe UI', Roboto, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    if (stroke) {
      ctx.lineWidth = size / 8;
      ctx.strokeStyle = stroke;
      ctx.strokeText(str, x, y);
    }
    ctx.fillStyle = color;
    ctx.fillText(str, x, y);
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2 + (1 - p.life) * 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawLaser() {
    if (!lasersOn) return;
    if (state !== STATE_READY && state !== STATE_PLAY) return;

    var e = eyeWorld();
    var ix = laserImpact.x, iy = laserImpact.y;
    var flick = 0.85 + Math.random() * 0.15;

    ctx.save();
    ctx.lineCap = "round";

    // outer glow
    ctx.globalAlpha = 0.25 * flick;
    ctx.strokeStyle = "#ff2d1a";
    ctx.lineWidth = 9;
    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(ix, iy); ctx.stroke();

    // mid beam
    ctx.globalAlpha = 0.7 * flick;
    ctx.strokeStyle = "#ff5a3c";
    ctx.lineWidth = 4.5;
    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(ix, iy); ctx.stroke();

    // white-hot core
    ctx.globalAlpha = flick;
    ctx.strokeStyle = "#fff3e0";
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(ix, iy); ctx.stroke();

    // impact spark — grows as the stalk heats toward vaporizing
    if (laserImpact.hit && laserHitPipe) {
      var heat = Math.min(1, laserHitPipe.charge / LASER_HOLD);
      var rad = 4 + heat * 10 + Math.random() * 2;
      var g = ctx.createRadialGradient(ix, iy, 0, ix, iy, rad);
      g.addColorStop(0, "rgba(255,255,220,0.95)");
      g.addColorStop(0.4, "rgba(255,150,40,0.8)");
      g.addColorStop(1, "rgba(255,60,30,0)");
      ctx.globalAlpha = 1;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(ix, iy, rad, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  function drawUI() {
    if (state === STATE_PLAY) {
      text(String(score), VW / 2, 80, 52, "#fff", "#3a3a3a");
    }

    // laser status indicator (top-center is always on-screen despite edge crop)
    if (lasersOn && state !== STATE_OVER) {
      var pulse = 0.6 + 0.4 * Math.abs(Math.sin(frame / 10));
      ctx.globalAlpha = pulse;
      ctx.fillStyle = "#ff3b30";
      ctx.beginPath(); ctx.arc(VW / 2 - 52, 26, 6, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      text("LASER ON", VW / 2 + 6, 26, 18, "#fff", "#3a3a3a");
    }

    if (state === STATE_READY) {
      text("Flappy Beans 🫘", VW / 2, 150, 30, "#fff", "#3a3a3a");
      // tap hint
      var bob = Math.sin(frame / 12) * 4;
      text("Tap to start", VW / 2, 360 + bob, 24, "#fff", "#3a3a3a");
      text("Best: " + best, VW / 2, 410, 18, "#fff", "#3a3a3a");
      // little finger hint
      ctx.font = "34px sans-serif";
      ctx.fillText("👆", VW / 2, 320 + bob);
      // laser gesture hint
      text("✌️ Two fingers = laser eyes", VW / 2, 450, 15, "#fff", "#3a3a3a");
    }

    if (state === STATE_OVER) {
      // panel
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.fillRect(0, 0, VW, VH);
      var pw = 250, ph = 230, px = (VW - pw) / 2, py = 160;
      ctx.fillStyle = "#fff7e6";
      roundRect(px, py, pw, ph, 18);
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = "#e0c98a";
      ctx.stroke();

      text("Game Over", VW / 2, py + 42, 30, "#b5651d");
      text("Score", VW / 2, py + 92, 18, "#9a7b3a");
      text(String(score), VW / 2, py + 122, 36, "#5a3d12");
      text("Best", VW / 2, py + 158, 18, "#9a7b3a");
      text(String(best), VW / 2, py + 185, 28, "#5a3d12");

      if (overTimer <= 0) {
        var bob2 = Math.sin(frame / 12) * 3;
        text("Tap to play again", VW / 2, py + ph + 40 + bob2, 22, "#fff", "#3a3a3a");
      }
    }

    // hit flash
    if (flashAlpha > 0) {
      ctx.fillStyle = "rgba(255,255,255," + Math.max(0, flashAlpha) + ")";
      ctx.fillRect(0, 0, VW, VH);
    }
  }

  // ---- Main loop -------------------------------------------------------------
  function render() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // reset to device pixels
    // clear full screen
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

    // apply virtual-canvas transform
    ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * offsetX, dpr * offsetY);

    drawBackground();
    for (var i = 0; i < pipes.length; i++) drawPipe(pipes[i]);
    drawParticles();
    drawGround();
    drawBean();
    drawLaser();
    drawUI();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  resetGame();
  loop();
})();
</script>
</body>
</html>
